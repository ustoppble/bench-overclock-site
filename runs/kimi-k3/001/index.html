<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  canvas { display: block; touch-action: none; }

  .glass {
    position: absolute;
    background: rgba(10, 14, 28, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    color: #dfe6f5;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
  }

  #hud { top: 16px; left: 16px; padding: 12px 16px; max-width: 320px; }
  #hud h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; margin-bottom: 6px;
            background: linear-gradient(90deg, #ffd77a, #ff9d5c);
            -webkit-background-clip: text; background-clip: text; color: transparent; }
  #hud p { font-size: 12px; line-height: 1.7; color: #aeb9d4; }
  #hud b { color: #fff; }

  #speed { bottom: 16px; left: 16px; padding: 10px 16px; font-size: 12px; width: 260px; }
  #speed label { display: flex; justify-content: space-between; margin-bottom: 6px; color: #aeb9d4; }
  #speed span { color: #ffd77a; font-weight: 700; }
  #speed input { width: 100%; accent-color: #ffb84d; cursor: pointer; }

  #info { top: 16px; right: 16px; width: 290px; padding: 18px 18px 14px; }
  #info.hidden { display: none; }
  #info h2 { font-size: 20px; margin-bottom: 12px; color: #ffd77a; }
  #info .row { display: flex; justify-content: space-between; gap: 10px;
               font-size: 12.5px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.07); }
  #info .row span { color: #8d99b8; }
  #info .row b { color: #eef2fb; text-align: right; }
  #infoDesc { margin-top: 10px; font-size: 12.5px; line-height: 1.6; color: #b9c3dc; }
  #closeInfo { position: absolute; top: 8px; right: 10px; background: none; border: none;
               color: #8d99b8; font-size: 22px; cursor: pointer; line-height: 1; }
  #closeInfo:hover { color: #fff; }
</style>
</head>
<body>

<div id="hud" class="glass">
  <h1>☀️ Sistema Solar 3D</h1>
  <p>
    🖱️ <b>Arrastar</b> olhar · <b>Clique</b> num planeta<br>
    ⌨️ <b>W A S D</b> voar · <b>Q / E</b> descer / subir<br>
    ⚡ <b>Shift</b> turbo · 🔍 <b>Scroll</b> zoom · <b>Esc</b> fechar
  </p>
</div>

<div id="speed" class="glass">
  <label>Velocidade do tempo <span id="speedVal">1,0×</span></label>
  <input id="speedRange" type="range" min="-1" max="2" step="0.01" value="0">
</div>

<div id="info" class="glass hidden">
  <button id="closeInfo" title="Fechar">×</button>
  <h2 id="infoName"></h2>
  <div class="row"><span>Diâmetro</span><b id="infoDiam"></b></div>
  <div class="row"><span>Distância do Sol</span><b id="infoDist"></b></div>
  <div class="row"><span>Ano (período orbital)</span><b id="infoPeriod"></b></div>
  <div class="row"><span>Dia (rotação)</span><b id="infoDay"></b></div>
  <p id="infoDesc"></p>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   Dados reais (tamanhos proporcionais, velocidades relativas reais)
   ============================================================ */
const SIZE = 0.5 / 6371;          // escala: Terra = 0,5 unidade de cena
const DAYS_PER_SEC = 12;          // 1× de velocidade: ano terrestre ≈ 30 s

const SUN = {
  name: 'Sol', color: '#ffb400', radius: 696000,
  diam: '1.392.700 km', dist: '— (centro)', periodTxt: '—', dayTxt: '≈ 27 dias',
  desc: 'Estrela anã amarela que concentra 99,86% de toda a massa do Sistema Solar. Sua energia vem da fusão de hidrogênio em hélio.'
};

const PLANETS = [
  { name: 'Mercúrio', color: '#93857a', radius: 2440,  orbit: 75,  period: 88,    rot: 58.6,  tilt: 0.03, tex: 'rock',
    diam: '4.879 km', dist: '57,9 milhões de km', periodTxt: '88 dias', dayTxt: '58,6 dias',
    desc: 'O menor planeta e o mais próximo do Sol. Sem atmosfera, sofre variações extremas de temperatura (−180 °C a 430 °C).' },
  { name: 'Vênus', color: '#d9b77c', radius: 6052, orbit: 100, period: 224.7, rot: -243, tilt: 177.4, tex: 'bands',
    palette: ['#e6cf9f', '#d9b77c', '#f0deb5', '#c9a56b'],
    diam: '12.104 km', dist: '108,2 milhões de km', periodTxt: '224,7 dias', dayTxt: '243 dias (retrógrada)',
    desc: 'O planeta mais quente (≈ 465 °C), envolto em nuvens de ácido sulfúrico. Gira no sentido contrário dos demais.' },
  { name: 'Terra', color: '#2f6fd0', radius: 6371, orbit: 130, period: 365.25, rot: 1, tilt: 23.4, tex: 'earth',
    diam: '12.742 km', dist: '149,6 milhões de km', periodTxt: '365,25 dias', dayTxt: '23,9 horas',
    desc: 'Nosso planeta — o único conhecido com vida, oceanos de água líquida e atmosfera rica em oxigênio.' },
  { name: 'Marte', color: '#b5532a', radius: 3390, orbit: 165, period: 687, rot: 1.03, tilt: 25.2, tex: 'rock',
    diam: '6.779 km', dist: '227,9 milhões de km', periodTxt: '687 dias', dayTxt: '24,6 horas',
    desc: 'O planeta vermelho. Abriga o Monte Olimpo, a maior montanha do Sistema Solar, com 21 km de altura.' },
  { name: 'Júpiter', color: '#c8a06e', radius: 69911, orbit: 218, period: 4333, rot: 0.41, tilt: 3.1, tex: 'bands',
    palette: ['#c8a06e', '#a67c4f', '#e0c9a6', '#8f6a45', '#d8b98c'], spot: '#c2543a',
    diam: '139.820 km', dist: '778,5 milhões de km', periodTxt: '11,9 anos', dayTxt: '9,9 horas',
    desc: 'O gigante gasoso: maior que todos os outros planetas juntos. A Grande Mancha Vermelha é uma tempestade maior que a Terra.' },
  { name: 'Saturno', color: '#e0c88f', radius: 58232, orbit: 282, period: 10759, rot: 0.44, tilt: 26.7, tex: 'bands',
    palette: ['#e0c88f', '#d4b87c', '#efe0b0', '#c9ab6e'], rings: true,
    diam: '116.460 km', dist: '1,43 bilhão de km', periodTxt: '29,4 anos', dayTxt: '10,7 horas',
    desc: 'Famoso por seus anéis de gelo e rocha com centenas de milhares de km de largura e apenas ~10 m de espessura.' },
  { name: 'Urano', color: '#a8dfe0', radius: 25362, orbit: 344, period: 30687, rot: -0.72, tilt: 97.8, tex: 'bands',
    palette: ['#a8dfe0', '#9fd5d8', '#b7e6e6', '#92ccd0'],
    diam: '50.724 km', dist: '2,87 bilhões de km', periodTxt: '84 anos', dayTxt: '17,2 horas (retrógrada)',
    desc: 'Gigante de gelo que gira praticamente "deitado": seu eixo tem inclinação de quase 98°.' },
  { name: 'Netuno', color: '#3a5bd9', radius: 24622, orbit: 400, period: 60190, rot: 0.67, tilt: 28.3, tex: 'bands',
    palette: ['#3a5bd9', '#2c48b0', '#5570e0', '#223a8f'],
    diam: '49.244 km', dist: '4,50 bilhões de km', periodTxt: '164,8 anos', dayTxt: '16,1 horas',
    desc: 'O planeta mais distante do Sol, com os ventos mais rápidos do Sistema Solar: até 2.100 km/h.' },
];

/* ============================================================
   Cena, câmera, renderizador
   ============================================================ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 30000);
camera.position.set(0, 150, 480);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
const canvas = renderer.domElement;

scene.add(new THREE.AmbientLight(0x555555, 1));
const sunLight = new THREE.PointLight(0xfff3dd, 2.8, 0, 0);
scene.add(sunLight);

/* ============================================================
   Texturas procedurais (canvas) — nenhum arquivo externo
   ============================================================ */
function canvasTexture(draw, w = 256, h = 128) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function blob(x, cx, cy, r) {
  x.beginPath();
  for (let a = 0; a < Math.PI * 2; a += 0.5) {
    const rr = r * (0.6 + Math.random() * 0.6);
    const px = cx + Math.cos(a) * rr, py = cy + Math.sin(a) * rr * 0.7;
    a === 0 ? x.moveTo(px, py) : x.lineTo(px, py);
  }
  x.closePath(); x.fill();
}

function makePlanetTexture(p) {
  return canvasTexture((x, w, h) => {
    x.fillStyle = p.color; x.fillRect(0, 0, w, h);
    if (p.tex === 'bands') {
      let y = 0;
      while (y < h) {
        const bh = 4 + Math.random() * 10;
        x.fillStyle = p.palette[(Math.random() * p.palette.length) | 0];
        x.globalAlpha = 0.25 + Math.random() * 0.35;
        x.fillRect(0, y, w, bh);
        y += bh;
      }
      x.globalAlpha = 1;
      if (p.spot) {
        x.fillStyle = p.spot; x.globalAlpha = 0.85;
        x.beginPath(); x.ellipse(w * 0.72, h * 0.66, 16, 8, 0, 0, Math.PI * 2); x.fill();
        x.globalAlpha = 1;
      }
    } else if (p.tex === 'earth') {
      for (let i = 0; i < 14; i++) {
        x.fillStyle = Math.random() < 0.5 ? '#3e7d3a' : '#6d8f4e';
        blob(x, Math.random() * w, 20 + Math.random() * (h - 40), 8 + Math.random() * 20);
      }
      x.fillStyle = 'rgba(255,255,255,0.9)';
      x.fillRect(0, 0, w, 7); x.fillRect(0, h - 7, w, 7);
      x.fillStyle = 'rgba(255,255,255,0.22)';
      for (let i = 0; i < 40; i++) {
        x.beginPath();
        x.ellipse(Math.random() * w, Math.random() * h, 10 + Math.random() * 18, 2 + Math.random() * 3, 0, 0, Math.PI * 2);
        x.fill();
      }
    } else { // 'rock' — solo com crateras/manchas
      for (let i = 0; i < 380; i++) {
        x.fillStyle = Math.random() < 0.5 ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.07)';
        x.beginPath();
        x.arc(Math.random() * w, Math.random() * h, 0.5 + Math.random() * 5, 0, Math.PI * 2);
        x.fill();
      }
    }
  });
}

/* ============================================================
   Fundo de estrelas
   ============================================================ */
{
  const N = 3500;
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  const palette = [0xffffff, 0xcfe0ff, 0xffe8c0, 0xffd5d5].map(c => new THREE.Color(c));
  for (let i = 0; i < N; i++) {
    const r = 4000 + Math.random() * 6000;
    const th = Math.acos(2 * Math.random() - 1), ph = Math.random() * Math.PI * 2;
    pos[i * 3]     = r * Math.sin(th) * Math.cos(ph);
    pos[i * 3 + 1] = r * Math.cos(th);
    pos[i * 3 + 2] = r * Math.sin(th) * Math.sin(ph);
    const c = palette[(Math.random() * palette.length) | 0], b = 0.4 + Math.random() * 0.6;
    col[i * 3] = c.r * b; col[i * 3 + 1] = c.g * b; col[i * 3 + 2] = c.b * b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    size: 1.8, sizeAttenuation: false, vertexColors: true, depthWrite: false
  })));
}

/* ============================================================
   Sol + brilho
   ============================================================ */
const SUN_R = SUN.radius * SIZE; // ≈ 54,6
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_R, 48, 32),
  new THREE.MeshBasicMaterial({
    map: canvasTexture((x, w, h) => {
      x.fillStyle = '#ff9d00'; x.fillRect(0, 0, w, h);
      for (let i = 0; i < 60; i++) {
        x.fillStyle = Math.random() < 0.5 ? 'rgba(255,220,120,0.35)' : 'rgba(255,120,20,0.30)';
        blob(x, Math.random() * w, Math.random() * h, 6 + Math.random() * 22);
      }
    })
  })
);
scene.add(sunMesh);

{ // halo luminoso (sprite com gradiente radial)
  const glowTex = canvasTexture((x, w, h) => {
    const g = x.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
    g.addColorStop(0, 'rgba(255,230,160,0.9)');
    g.addColorStop(0.25, 'rgba(255,180,80,0.45)');
    g.addColorStop(0.6, 'rgba(255,140,40,0.12)');
    g.addColorStop(1, 'rgba(255,120,20,0)');
    x.fillStyle = g; x.fillRect(0, 0, w, h);
  }, 256, 256);
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  glow.scale.setScalar(SUN_R * 6);
  scene.add(glow);
}

/* ============================================================
   Planetas, órbitas e alvos de clique
   ============================================================ */
const clickTargets = [];
const planets = [];

function orbitLine(r) {
  const pts = [];
  for (let i = 0; i < 256; i++) {
    const a = (i / 256) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
  }
  return new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x8890b8, transparent: true, opacity: 0.28 })
  );
}

for (const p of PLANETS) {
  const r = p.radius * SIZE;
  const node = new THREE.Group();                    // nó orbital (posição + inclinação)
  node.rotation.z = THREE.MathUtils.degToRad(p.tilt);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 24),
    new THREE.MeshStandardMaterial({
      map: makePlanetTexture(p), roughness: 0.9, metalness: 0.05,
      emissive: new THREE.Color(p.color), emissiveIntensity: 0
    })
  );
  node.add(mesh);

  if (p.rings) { // anéis de Saturno
    const inner = r * 1.25, outer = r * 2.35;
    const geo = new THREE.RingGeometry(inner, outer, 96, 1);
    const posAttr = geo.attributes.position, uvAttr = geo.attributes.uv, v = new THREE.Vector3();
    for (let i = 0; i < posAttr.count; i++) {      // UV radial p/ textura em faixas
      v.fromBufferAttribute(posAttr, i);
      uvAttr.setXY(i, (v.length() - inner) / (outer - inner), 0.5);
    }
    const ringTex = canvasTexture((x, w, h) => {
      x.clearRect(0, 0, w, h);
      let px = 0;
      while (px < w) {
        const bw = 4 + Math.random() * 22;
        x.fillStyle = `rgba(${215 + Math.random()*30 | 0},${195 + Math.random()*25 | 0},${150 + Math.random()*30 | 0},${(0.15 + Math.random() * 0.7).toFixed(2)})`;
        x.fillRect(px, 0, bw, h);
        px += bw + Math.random() * 6;
      }
    }, 256, 8);
    const ring = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
      map: ringTex, side: THREE.DoubleSide, transparent: true, depthWrite: false
    }));
    ring.rotation.x = -Math.PI / 2;
    node.add(ring);
  }

  // esfera invisível maior para facilitar o clique
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(r * 1.8, 2.4), 12, 8),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hit.userData = { data: p, mesh };
  node.add(hit);
  clickTargets.push(hit);

  scene.add(node);
  scene.add(orbitLine(p.orbit));

  p._angle = Math.random() * Math.PI * 2;
  p._omega = (Math.PI * 2 / p.period) * DAYS_PER_SEC;   // rad/s na velocidade 1×
  p._spin  = (Math.PI * 2 / p.rot) * DAYS_PER_SEC * 0.02; // rotação visual proporcional
  planets.push({ p, node, mesh });
}

{ // alvo de clique do Sol
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(SUN_R, 16, 12),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hit.userData = { data: SUN, mesh: sunMesh };
  scene.add(hit);
  clickTargets.push(hit);
}

/* ============================================================
   Controles de voo (mouse + WASD + zoom)
   ============================================================ */
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Escape') select(null); });
addEventListener('keyup',   e => { keys[e.code] = false; });

const e0 = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
let yaw = e0.y, pitch = e0.x;

let dragging = false, moved = 0, lastX = 0, lastY = 0, downTime = 0;

canvas.addEventListener('pointerdown', e => {
  dragging = true; moved = 0; downTime = performance.now();
  lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('pointermove', e => {
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    moved += Math.abs(dx) + Math.abs(dy);
    yaw   -= dx * 0.0032;
    pitch -= dy * 0.0032;
    pitch = THREE.MathUtils.clamp(pitch, -1.55, 1.55);
    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
  } else {
    canvas.style.cursor = pick(e) ? 'pointer' : 'grab';
  }
});

canvas.addEventListener('pointerup', e => {
  dragging = false;
  canvas.style.cursor = 'grab';
  if (moved < 6 && performance.now() - downTime < 600) select(pick(e)); // clique (sem arrastar)
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  const dist = camera.position.length();
  const step = -e.deltaY * 0.06 * Math.max(0.4, dist / 140); // zoom proporcional à distância
  camera.position.addScaledVector(fwd, step);
}, { passive: false });

function updateFlight(dt) {
  const turbo = keys['ShiftLeft'] || keys['ShiftRight'];
  const dist = camera.position.length();
  const speed = 70 * (turbo ? 4 : 1) * THREE.MathUtils.clamp(dist / 150, 0.35, 8);
  const fwd   = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  const up    = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
  if (keys['KeyW']) camera.position.addScaledVector(fwd,   speed * dt);
  if (keys['KeyS']) camera.position.addScaledVector(fwd,  -speed * dt);
  if (keys['KeyD']) camera.position.addScaledVector(right, speed * dt);
  if (keys['KeyA']) camera.position.addScaledVector(right,-speed * dt);
  if (keys['KeyE']) camera.position.addScaledVector(up,    speed * dt);
  if (keys['KeyQ']) camera.position.addScaledVector(up,   -speed * dt);
}

/* ============================================================
   Seleção de planeta + painel de dados
   ============================================================ */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let selected = null;

function pick(e) {
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(clickTargets, false);
  return hits.length ? hits[0].object.userData : null;
}

const infoEl = document.getElementById('info');
function select(target) {
  if (selected?.mesh.material.emissive) selected.mesh.material.emissiveIntensity = 0;
  selected = target;
  if (!target) { infoEl.classList.add('hidden'); return; }
  if (target.mesh.material.emissive) target.mesh.material.emissiveIntensity = 0.5;
  const d = target.data;
  document.getElementById('infoName').textContent = d.name;
  document.getElementById('infoDiam').textContent = d.diam;
  document.getElementById('infoDist').textContent = d.dist;
  document.getElementById('infoPeriod').textContent = d.periodTxt;
  document.getElementById('infoDay').textContent = d.dayTxt;
  document.getElementById('infoDesc').textContent = d.desc;
  infoEl.classList.remove('hidden');
}
document.getElementById('closeInfo').addEventListener('click', () => select(null));

/* ============================================================
   Controle de velocidade do tempo
   ============================================================ */
let speedMul = 1;
const speedRange = document.getElementById('speedRange');
const speedVal = document.getElementById('speedVal');
speedRange.addEventListener('input', () => {
  speedMul = Math.pow(10, parseFloat(speedRange.value)); // 0,1× a 100×
  speedVal.textContent = (speedMul < 10 ? speedMul.toFixed(1).replace('.', ',') : Math.round(speedMul)) + '×';
});

/* ============================================================
   Loop principal
   ============================================================ */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  updateFlight(dt);

  const step = dt * speedMul;
  for (const { p, node, mesh } of planets) {
    p._angle += p._omega * step;
    node.position.set(Math.cos(p._angle) * p.orbit, 0, Math.sin(p._angle) * p.orbit);
    mesh.rotation.y += p._spin * step;
  }
  sunMesh.rotation.y += dt * 0.02;

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
