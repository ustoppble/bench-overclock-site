<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratório de Gravidade</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #edf5ff;
      --muted: #9caecc;
      --panel: rgba(9, 17, 38, 0.62);
      --panel-edge: rgba(167, 201, 255, 0.14);
      --accent: #82d7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 17% 18%, rgba(90, 117, 255, 0.23), transparent 29rem),
        radial-gradient(circle at 83% 78%, rgba(0, 210, 185, 0.16), transparent 31rem),
        linear-gradient(135deg, #060b1b 0%, #0a1330 48%, #070d1c 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      content: "";
      opacity: 0.34;
      background-image: radial-gradient(rgba(178, 211, 255, 0.38) 0.75px, transparent 0.75px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 92%);
    }

    #world {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .interface {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(1rem, 3vw, 2.5rem);
      pointer-events: none;
    }

    .intro,
    .controls,
    .counter {
      border: 1px solid var(--panel-edge);
      background: var(--panel);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.22), inset 0 1px rgba(255, 255, 255, 0.045);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .intro {
      max-width: 21.5rem;
      padding: 1.1rem 1.2rem 1.15rem;
      border-radius: 1.25rem;
    }

    .eyebrow {
      margin: 0 0 0.45rem;
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      letter-spacing: -0.035em;
    }

    .instructions {
      margin: 0.65rem 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .instructions strong {
      color: #dcecff;
      font-weight: 700;
    }

    .controls {
      padding: 0.45rem;
      border-radius: 1rem;
      pointer-events: auto;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.62rem;
      min-height: 2.95rem;
      padding: 0.72rem 1rem 0.72rem 0.78rem;
      border: 0;
      border-radius: 0.7rem;
      background: linear-gradient(135deg, #86dcff, #7d9bff);
      color: #071124;
      font: inherit;
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(74, 135, 255, 0.28);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    button:hover {
      filter: brightness(1.07);
      box-shadow: 0 11px 28px rgba(74, 135, 255, 0.4);
      transform: translateY(-1px);
    }

    button:active,
    button.is-pressed {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 4px 12px rgba(74, 135, 255, 0.25);
    }

    button:focus-visible {
      outline: 3px solid rgba(185, 232, 255, 0.92);
      outline-offset: 3px;
    }

    .plus {
      display: grid;
      width: 1.42rem;
      height: 1.42rem;
      place-items: center;
      border-radius: 50%;
      background: rgba(7, 17, 36, 0.16);
      font-size: 1.2rem;
      line-height: 1;
    }

    .counter {
      position: fixed;
      right: clamp(1rem, 3vw, 2.5rem);
      bottom: clamp(1rem, 3vw, 2.5rem);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.58rem 0.78rem;
      border-radius: 99px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 650;
      letter-spacing: 0.01em;
      pointer-events: none;
    }

    .status-dot {
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 50%;
      background: #72edb0;
      box-shadow: 0 0 0.6rem rgba(114, 237, 176, 0.9);
    }

    @media (max-width: 620px) {
      .interface {
        flex-direction: column;
        padding: 0.9rem;
      }

      .intro {
        max-width: calc(100vw - 1.8rem);
        padding: 0.85rem 1rem 0.9rem;
      }

      .instructions {
        font-size: 0.78rem;
      }

      .controls {
        align-self: flex-end;
      }

      button {
        min-height: 2.65rem;
        font-size: 0.77rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="world" aria-label="Simulação interativa de bolinhas com gravidade"></canvas>

  <main class="interface">
    <section class="intro" aria-label="Como interagir">
      <p class="eyebrow">Simulação em tempo real</p>
      <h1>Laboratório de gravidade</h1>
      <p class="instructions">
        <strong>Segure</strong> o mouse para atrair as bolinhas próximas.
        <strong>Clique</strong> para criar uma explosão.
      </p>
    </section>

    <div class="controls">
      <button id="add-balls" type="button" aria-label="Soltar 50 bolinhas novas">
        <span class="plus" aria-hidden="true">+</span>
        Soltar 50 bolinhas
      </button>
    </div>
  </main>

  <div class="counter" aria-live="polite">
    <span class="status-dot" aria-hidden="true"></span>
    <span id="ball-count">0 bolinhas ativas</span>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("world");
      const context = canvas.getContext("2d", { alpha: true });
      const addButton = document.getElementById("add-balls");
      const ballCount = document.getElementById("ball-count");

      const STEP = 1 / 120;
      const MAX_FRAME_TIME = 0.05;
      const MAX_STEPS_PER_FRAME = 6;
      const GRAVITY = 1250;
      const MAX_SPEED = 2400;
      const MIN_RADIUS = 8;
      const MAX_RADIUS = 18;
      const CELL_SIZE = MAX_RADIUS * 2 + 4;
      const SOLVER_ITERATIONS = 3;
      const MAX_BALLS = 420;
      const ATTRACTION_RADIUS = 190;
      const ATTRACTION_STRENGTH = 1650;
      const BLAST_RADIUS = 205;
      const BLAST_STRENGTH = 1180;
      const WALL_BOUNCE = 0.82;
      const FLOOR_BOUNCE = 0.7;
      const TAU = Math.PI * 2;
      const VELOCITY_DAMPING = Math.pow(0.999, STEP * 60);

      const palette = [
        { fill: "#ff6b87", glow: "rgba(255, 107, 135, 0.20)" },
        { fill: "#ffb45f", glow: "rgba(255, 180, 95, 0.20)" },
        { fill: "#f9e75d", glow: "rgba(249, 231, 93, 0.19)" },
        { fill: "#68dfaa", glow: "rgba(104, 223, 170, 0.20)" },
        { fill: "#62c9ff", glow: "rgba(98, 201, 255, 0.20)" },
        { fill: "#9b8cff", glow: "rgba(155, 140, 255, 0.20)" },
        { fill: "#ef8fff", glow: "rgba(239, 143, 255, 0.20)" }
      ];

      const balls = [];
      const grid = new Map();
      const pulses = [];
      const neighborOffsets = [
        [1, 0],
        [0, 1],
        [1, 1],
        [-1, 1]
      ];
      const pointer = { x: 0, y: 0, down: false, visible: false, id: null };

      let width = 0;
      let height = 0;
      let pixelRatio = 1;
      let nextId = 1;
      let previousTime = performance.now();
      let accumulator = 0;

      const random = (min, max) => min + Math.random() * (max - min);
      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const cellKey = (x, y) => `${x}:${y}`;

      function safeX(radius) {
        return width > radius * 2 ? random(radius, width - radius) : width / 2;
      }

      function updateCounter() {
        ballCount.textContent = `${balls.length} bolinhas ativas`;
      }

      function createBall(index, total, raining) {
        const radius = random(MIN_RADIUS, MAX_RADIUS);
        const color = palette[Math.floor(Math.random() * palette.length)];
        let x = safeX(radius);
        let y;

        if (raining) {
          const columns = Math.min(10, total);
          const column = index % columns;
          const row = Math.floor(index / columns);
          const laneWidth = width / columns;
          x = clamp((column + random(0.16, 0.84)) * laneWidth, radius, width - radius);
          y = -radius - row * random(26, 37) - random(0, 45);
        } else {
          y = random(-120, Math.max(100, height * 0.6));
        }

        const mass = radius * radius;
        return {
          id: nextId++,
          x,
          y,
          vx: random(-85, 85),
          vy: raining ? random(5, 110) : random(-20, 130),
          radius,
          invMass: 1 / mass,
          fill: color.fill,
          glow: color.glow
        };
      }

      function addBalls(amount, raining = true) {
        const overflow = Math.max(0, balls.length + amount - MAX_BALLS);
        if (overflow) balls.splice(0, overflow);

        for (let index = 0; index < amount; index += 1) {
          balls.push(createBall(index, amount, raining));
        }
        updateCounter();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        width = Math.max(1, rect.width);
        height = Math.max(1, rect.height);
        pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(width * pixelRatio);
        canvas.height = Math.round(height * pixelRatio);
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];
          ball.x = clamp(ball.x, ball.radius, Math.max(ball.radius, width - ball.radius));
          ball.y = clamp(ball.y, ball.radius, Math.max(ball.radius, height - ball.radius));
        }
      }

      function applyPointerAttraction(dt) {
        if (!pointer.down) return;

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];
          let dx = pointer.x - ball.x;
          let dy = pointer.y - ball.y;
          const distanceSquared = dx * dx + dy * dy;

          if (distanceSquared === 0 || distanceSquared >= ATTRACTION_RADIUS * ATTRACTION_RADIUS) continue;

          const distance = Math.sqrt(distanceSquared);
          const falloff = 1 - distance / ATTRACTION_RADIUS;
          const force = ATTRACTION_STRENGTH * falloff * falloff;
          dx /= distance;
          dy /= distance;
          ball.vx += dx * force * dt;
          ball.vy += dy * force * dt;
        }
      }

      function constrainToWalls(ball) {
        const right = width - ball.radius;
        const bottom = height - ball.radius;

        if (ball.x < ball.radius) {
          ball.x = ball.radius;
          if (ball.vx < 0) ball.vx = -ball.vx * WALL_BOUNCE;
        } else if (ball.x > right) {
          ball.x = right;
          if (ball.vx > 0) ball.vx = -ball.vx * WALL_BOUNCE;
        }

        if (ball.y < ball.radius && ball.vy < 0) {
          ball.y = ball.radius;
          ball.vy = -ball.vy * WALL_BOUNCE;
        } else if (ball.y > bottom) {
          ball.y = bottom;
          if (ball.vy > 0) {
            ball.vy = -ball.vy * FLOOR_BOUNCE;
            if (Math.abs(ball.vy) < 24) ball.vy = 0;
            ball.vx *= 0.992;
          }
        }
      }

      function rebuildGrid() {
        grid.clear();

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];
          const x = Math.floor(ball.x / CELL_SIZE);
          const y = Math.floor(ball.y / CELL_SIZE);
          const key = cellKey(x, y);
          let cell = grid.get(key);

          if (!cell) {
            cell = { x, y, balls: [] };
            grid.set(key, cell);
          }
          cell.balls.push(ball);
        }
      }

      function resolvePair(a, b) {
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        const minimumDistance = a.radius + b.radius;
        const distanceSquared = dx * dx + dy * dy;

        if (distanceSquared >= minimumDistance * minimumDistance) return;

        let distance = Math.sqrt(distanceSquared);
        let nx;
        let ny;

        if (distance < 0.0001) {
          const angle = ((a.id * 19 + b.id * 37) % 360) * (Math.PI / 180);
          nx = Math.cos(angle);
          ny = Math.sin(angle);
          distance = 0;
        } else {
          nx = dx / distance;
          ny = dy / distance;
        }

        const inverseMassTotal = a.invMass + b.invMass;
        const overlap = minimumDistance - distance;
        const correction = (Math.max(overlap - 0.12, 0) / inverseMassTotal) * 0.82;

        a.x -= nx * correction * a.invMass;
        a.y -= ny * correction * a.invMass;
        b.x += nx * correction * b.invMass;
        b.y += ny * correction * b.invMass;

        const relativeVx = b.vx - a.vx;
        const relativeVy = b.vy - a.vy;
        const velocityAlongNormal = relativeVx * nx + relativeVy * ny;

        if (velocityAlongNormal >= 0) return;

        const restitution = velocityAlongNormal < -65 ? 0.82 : 0.16;
        const impulse = (-(1 + restitution) * velocityAlongNormal) / inverseMassTotal;
        const impulseX = impulse * nx;
        const impulseY = impulse * ny;

        a.vx -= impulseX * a.invMass;
        a.vy -= impulseY * a.invMass;
        b.vx += impulseX * b.invMass;
        b.vy += impulseY * b.invMass;
      }

      function solveCollisions() {
        for (const cell of grid.values()) {
          const inCell = cell.balls;

          for (let first = 0; first < inCell.length; first += 1) {
            for (let second = first + 1; second < inCell.length; second += 1) {
              resolvePair(inCell[first], inCell[second]);
            }
          }

          for (let offsetIndex = 0; offsetIndex < neighborOffsets.length; offsetIndex += 1) {
            const [offsetX, offsetY] = neighborOffsets[offsetIndex];
            const neighbor = grid.get(cellKey(cell.x + offsetX, cell.y + offsetY));
            if (!neighbor) continue;

            for (let first = 0; first < inCell.length; first += 1) {
              for (let second = 0; second < neighbor.balls.length; second += 1) {
                resolvePair(inCell[first], neighbor.balls[second]);
              }
            }
          }
        }
      }

      function simulate(dt) {
        applyPointerAttraction(dt);

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];
          ball.vy += GRAVITY * dt;
          ball.vx *= VELOCITY_DAMPING;
          ball.vy *= VELOCITY_DAMPING;

          const speed = Math.hypot(ball.vx, ball.vy);
          if (speed > MAX_SPEED) {
            const scale = MAX_SPEED / speed;
            ball.vx *= scale;
            ball.vy *= scale;
          }

          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;
          constrainToWalls(ball);
        }

        for (let iteration = 0; iteration < SOLVER_ITERATIONS; iteration += 1) {
          rebuildGrid();
          solveCollisions();
          for (let index = 0; index < balls.length; index += 1) {
            constrainToWalls(balls[index]);
          }
        }
      }

      function triggerBlast() {
        pulses.push({ x: pointer.x, y: pointer.y, started: performance.now() });

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];
          let dx = ball.x - pointer.x;
          let dy = ball.y - pointer.y;
          const distanceSquared = dx * dx + dy * dy;

          if (distanceSquared >= BLAST_RADIUS * BLAST_RADIUS) continue;

          let distance = Math.sqrt(distanceSquared);
          if (distance < 0.001) {
            const angle = ((ball.id * 53) % 360) * (Math.PI / 180);
            dx = Math.cos(angle);
            dy = Math.sin(angle);
            distance = 1;
          } else {
            dx /= distance;
            dy /= distance;
          }

          const falloff = 1 - distance / BLAST_RADIUS;
          const strength = BLAST_STRENGTH * Math.pow(falloff, 0.62) + 100;
          ball.vx += dx * strength;
          ball.vy += dy * strength;
        }
      }

      function drawPointer() {
        if (!pointer.visible) return;

        context.save();
        context.translate(pointer.x, pointer.y);
        context.lineWidth = 1.2;
        context.strokeStyle = pointer.down ? "rgba(145, 222, 255, 0.42)" : "rgba(145, 222, 255, 0.18)";
        context.beginPath();
        context.arc(0, 0, pointer.down ? ATTRACTION_RADIUS : 14, 0, TAU);
        context.stroke();

        if (pointer.down) {
          context.fillStyle = "rgba(134, 220, 255, 0.08)";
          context.beginPath();
          context.arc(0, 0, ATTRACTION_RADIUS, 0, TAU);
          context.fill();
        } else {
          context.fillStyle = "rgba(214, 244, 255, 0.82)";
          context.beginPath();
          context.arc(0, 0, 2.5, 0, TAU);
          context.fill();
        }
        context.restore();
      }

      function drawPulses(now) {
        for (let index = pulses.length - 1; index >= 0; index -= 1) {
          const pulse = pulses[index];
          const age = (now - pulse.started) / 1000;
          if (age > 0.52) {
            pulses.splice(index, 1);
            continue;
          }

          const progress = age / 0.52;
          context.save();
          context.globalAlpha = (1 - progress) * 0.8;
          context.strokeStyle = "#c8f4ff";
          context.lineWidth = 2.4 - progress * 1.2;
          context.beginPath();
          context.arc(pulse.x, pulse.y, 8 + progress * BLAST_RADIUS, 0, TAU);
          context.stroke();
          context.restore();
        }
      }

      function render(now) {
        context.clearRect(0, 0, width, height);
        drawPointer();
        drawPulses(now);

        for (let index = 0; index < balls.length; index += 1) {
          const ball = balls[index];

          context.fillStyle = ball.glow;
          context.beginPath();
          context.arc(ball.x, ball.y, ball.radius * 1.45, 0, TAU);
          context.fill();

          context.fillStyle = ball.fill;
          context.beginPath();
          context.arc(ball.x, ball.y, ball.radius, 0, TAU);
          context.fill();

          context.fillStyle = "rgba(255, 255, 255, 0.48)";
          context.beginPath();
          context.arc(ball.x - ball.radius * 0.28, ball.y - ball.radius * 0.3, Math.max(1.4, ball.radius * 0.2), 0, TAU);
          context.fill();
        }
      }

      function animate(now) {
        const frameTime = Math.min((now - previousTime) / 1000, MAX_FRAME_TIME);
        previousTime = now;
        accumulator += frameTime;

        let steps = 0;
        while (accumulator >= STEP && steps < MAX_STEPS_PER_FRAME) {
          simulate(STEP);
          accumulator -= STEP;
          steps += 1;
        }
        if (steps === MAX_STEPS_PER_FRAME) accumulator = 0;

        render(now);
        requestAnimationFrame(animate);
      }

      function setPointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        pointer.x = event.clientX - rect.left;
        pointer.y = event.clientY - rect.top;
        pointer.visible = true;
      }

      canvas.addEventListener("pointermove", (event) => {
        if (pointer.down && event.pointerId !== pointer.id) return;
        setPointerPosition(event);
      });

      canvas.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        if (pointer.down && event.pointerId !== pointer.id) return;
        setPointerPosition(event);
        pointer.down = true;
        pointer.id = event.pointerId;
        canvas.setPointerCapture(event.pointerId);
        triggerBlast();
        event.preventDefault();
      });

      function releasePointer(event) {
        if (pointer.id !== null && event.pointerId !== pointer.id) return;
        pointer.down = false;
        pointer.id = null;
      }

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("lostpointercapture", releasePointer);
      canvas.addEventListener("pointerleave", () => {
        if (!pointer.down) pointer.visible = false;
      });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      addButton.addEventListener("click", () => {
        addBalls(50, true);
        addButton.classList.remove("is-pressed");
        void addButton.offsetWidth;
        addButton.classList.add("is-pressed");
      });
      addButton.addEventListener("animationend", () => addButton.classList.remove("is-pressed"));
      addButton.addEventListener("transitionend", () => addButton.classList.remove("is-pressed"));

      window.addEventListener("resize", resize, { passive: true });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          previousTime = performance.now();
          accumulator = 0;
        }
      });

      resize();
      addBalls(72, false);
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
