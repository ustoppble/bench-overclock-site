<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Física Interativa — Bolinhas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f1a;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #e8ecf4;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    #ui button {
      pointer-events: auto;
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #0b0f1a;
      background: linear-gradient(135deg, #7cf5c8, #5ec8ff);
      box-shadow:
        0 4px 20px rgba(94, 200, 255, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    #ui button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 6px 28px rgba(94, 200, 255, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }
    #ui button:active {
      transform: translateY(1px) scale(0.98);
    }
    #hint {
      font-size: 12px;
      line-height: 1.45;
      color: rgba(232, 236, 244, 0.65);
      max-width: 260px;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
    }
    #count {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: rgba(124, 245, 200, 0.85);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>
  <div id="ui">
    <button type="button" id="spawnBtn">+ 50 bolinhas</button>
    <div id="count">0 bolinhas</div>
    <div id="hint">
      Segure o mouse para atrair · clique para explodir · bordas e colisões realistas
    </div>
  </div>
  <canvas id="c"></canvas>
  <script>
(function () {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });
  const countEl = document.getElementById("count");
  const spawnBtn = document.getElementById("spawnBtn");

  // ── Physics constants ──────────────────────────────────────────
  const GRAVITY = 980;          // px/s²
  const RESTITUTION = 0.82;     // bounce elasticity (ball–ball & wall)
  const FRICTION = 0.998;       // air drag per frame-ish (applied as vel *=)
  const WALL_FRICTION = 0.92;   // tangential damping on wall hit
  const MAX_BALLS = 600;
  const ATTRACT_RADIUS = 220;
  const ATTRACT_STRENGTH = 1800;
  const EXPLODE_RADIUS = 280;
  const EXPLODE_FORCE = 900;
  const SUBSTEPS = 4;           // more steps = stabler collisions

  // ── State ──────────────────────────────────────────────────────
  let W = 0, H = 0, dpr = 1;
  const balls = [];
  const mouse = { x: 0, y: 0, down: false, px: 0, py: 0 };
  let lastTime = 0;
  let attractPulse = 0; // visual pulse when attracting

  const PALETTE = [
    "#ff6b6b", "#feca57", "#48dbfb", "#1dd1a1",
    "#5f27cd", "#ff9ff3", "#54a0ff", "#00d2d3",
    "#ff9f43", "#ee5a24", "#c8d6e5", "#a29bfe",
  ];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function rand(a, b) {
    return a + Math.random() * (b - a);
  }

  function pickColor() {
    return PALETTE[(Math.random() * PALETTE.length) | 0];
  }

  function createBall(x, y) {
    const r = rand(8, 18);
    return {
      x: x ?? rand(r, W - r),
      y: y ?? rand(-H * 0.4, -r),
      vx: rand(-80, 80),
      vy: rand(0, 40),
      r,
      mass: r * r, // area-proportional mass
      color: pickColor(),
      glow: 0,
    };
  }

  function spawn(n, atCursor) {
    const room = MAX_BALLS - balls.length;
    const count = Math.min(n, room);
    for (let i = 0; i < count; i++) {
      if (atCursor) {
        const ang = Math.random() * Math.PI * 2;
        const dist = Math.random() * 40;
        balls.push(createBall(
          mouse.x + Math.cos(ang) * dist,
          mouse.y + Math.sin(ang) * dist
        ));
      } else {
        balls.push(createBall(
          rand(30, W - 30),
          rand(-120, -20)
        ));
      }
    }
    updateCount();
  }

  function updateCount() {
    countEl.textContent = balls.length + " bolinha" + (balls.length === 1 ? "" : "s");
  }

  // ── Collisions ─────────────────────────────────────────────────
  function resolveBallBall(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let distSq = dx * dx + dy * dy;
    const minDist = a.r + b.r;
    if (distSq === 0) {
      // perfect overlap — nudge apart
      dx = rand(-1, 1) || 0.01;
      dy = rand(-1, 1) || 0.01;
      distSq = dx * dx + dy * dy;
    }
    if (distSq >= minDist * minDist) return;

    const dist = Math.sqrt(distSq);
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = minDist - dist;

    // Positional correction (mass-weighted)
    const totalMass = a.mass + b.mass;
    const corrA = (overlap * (b.mass / totalMass));
    const corrB = (overlap * (a.mass / totalMass));
    a.x -= nx * corrA;
    a.y -= ny * corrA;
    b.x += nx * corrB;
    b.y += ny * corrB;

    // Relative velocity along normal
    const rvx = b.vx - a.vx;
    const rvy = b.vy - a.vy;
    const velAlongNormal = rvx * nx + rvy * ny;
    if (velAlongNormal > 0) return; // already separating

    // Impulse (elastic + restitution)
    const e = RESTITUTION;
    const invMassA = 1 / a.mass;
    const invMassB = 1 / b.mass;
    const j = -(1 + e) * velAlongNormal / (invMassA + invMassB);
    const ix = j * nx;
    const iy = j * ny;
    a.vx -= ix * invMassA;
    a.vy -= iy * invMassA;
    b.vx += ix * invMassB;
    b.vy += iy * invMassB;
  }

  function resolveWalls(b) {
    // Left
    if (b.x - b.r < 0) {
      b.x = b.r;
      if (b.vx < 0) b.vx = -b.vx * RESTITUTION;
      b.vy *= WALL_FRICTION;
    }
    // Right
    if (b.x + b.r > W) {
      b.x = W - b.r;
      if (b.vx > 0) b.vx = -b.vx * RESTITUTION;
      b.vy *= WALL_FRICTION;
    }
    // Top
    if (b.y - b.r < 0) {
      b.y = b.r;
      if (b.vy < 0) b.vy = -b.vy * RESTITUTION;
      b.vx *= WALL_FRICTION;
    }
    // Bottom
    if (b.y + b.r > H) {
      b.y = H - b.r;
      if (b.vy > 0) b.vy = -b.vy * RESTITUTION;
      b.vx *= WALL_FRICTION;
      // tiny resting threshold to avoid jitter
      if (Math.abs(b.vy) < 12) b.vy = 0;
      if (Math.abs(b.vx) < 4) b.vx = 0;
    }
  }

  // Spatial hash for broadphase
  const CELL = 48;
  const grid = new Map();

  function cellKey(cx, cy) {
    return cx + "," + cy;
  }

  function broadphasePairs() {
    grid.clear();
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const minX = ((b.x - b.r) / CELL) | 0;
      const maxX = ((b.x + b.r) / CELL) | 0;
      const minY = ((b.y - b.r) / CELL) | 0;
      const maxY = ((b.y + b.r) / CELL) | 0;
      for (let cx = minX; cx <= maxX; cx++) {
        for (let cy = minY; cy <= maxY; cy++) {
          const k = cellKey(cx, cy);
          let bucket = grid.get(k);
          if (!bucket) {
            bucket = [];
            grid.set(k, bucket);
          }
          bucket.push(i);
        }
      }
    }

    const seen = new Set();
    const pairs = [];
    for (const bucket of grid.values()) {
      const n = bucket.length;
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const a = bucket[i];
          const b = bucket[j];
          const key = a < b ? a + "-" + b : b + "-" + a;
          if (seen.has(key)) continue;
          seen.add(key);
          pairs.push(a, b);
        }
      }
    }
    return pairs;
  }

  // ── Mouse forces ───────────────────────────────────────────────
  // Attraction only after HOLD_MS so a quick click doesn't pull first
  const HOLD_MS = 140;

  function applyAttraction(dt) {
    if (!mouse.down) return;
    if (performance.now() - pointerDownAt < HOLD_MS) return;
    attractPulse = Math.min(1, attractPulse + dt * 4);
    const r2 = ATTRACT_RADIUS * ATTRACT_RADIUS;
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const dx = mouse.x - b.x;
      const dy = mouse.y - b.y;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2 || d2 < 1) continue;
      const d = Math.sqrt(d2);
      // Smooth falloff: stronger near center, soft edge
      const t = 1 - d / ATTRACT_RADIUS;
      const force = ATTRACT_STRENGTH * t * t;
      b.vx += (dx / d) * force * dt;
      b.vy += (dy / d) * force * dt;
      b.glow = Math.max(b.glow, t);
    }
  }

  function explode() {
    const r2 = EXPLODE_RADIUS * EXPLODE_RADIUS;
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const dx = b.x - mouse.x;
      const dy = b.y - mouse.y;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2) continue;
      const d = Math.sqrt(d2) || 0.01;
      const t = 1 - d / EXPLODE_RADIUS;
      const force = EXPLODE_FORCE * t * t;
      b.vx += (dx / d) * force;
      b.vy += (dy / d) * force;
      b.glow = 1;
    }
    // Visual shockwave
    shockwaves.push({ x: mouse.x, y: mouse.y, r: 10, max: EXPLODE_RADIUS, life: 1 });
  }

  const shockwaves = [];

  // ── Simulation step ────────────────────────────────────────────
  function step(dt) {
    // Cap dt for stability (pause/tab switch)
    dt = Math.min(dt, 1 / 30);
    const h = dt / SUBSTEPS;

    attractPulse *= Math.pow(0.2, dt);
    if (mouse.down) applyAttraction(dt);

    for (let s = 0; s < SUBSTEPS; s++) {
      for (let i = 0; i < balls.length; i++) {
        const b = balls[i];
        b.vy += GRAVITY * h;
        // mild velocity damping for calm settling
        const damp = Math.pow(FRICTION, h * 60);
        b.vx *= damp;
        b.vy *= damp;
        b.x += b.vx * h;
        b.y += b.vy * h;
        b.glow *= 0.96;
        resolveWalls(b);
      }

      // Pairwise collisions via spatial hash
      const pairs = broadphasePairs();
      for (let p = 0; p < pairs.length; p += 2) {
        resolveBallBall(balls[pairs[p]], balls[pairs[p + 1]]);
      }
      // Second pass for better stacking
      for (let p = 0; p < pairs.length; p += 2) {
        resolveBallBall(balls[pairs[p]], balls[pairs[p + 1]]);
      }
    }

    // Shockwaves
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.life -= dt * 2.2;
      sw.r += (sw.max - sw.r) * Math.min(1, dt * 8);
      if (sw.life <= 0) shockwaves.splice(i, 1);
    }
  }

  // ── Rendering ──────────────────────────────────────────────────
  function drawBackground() {
    // Soft vertical gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0b0f1a");
    g.addColorStop(0.55, "#10182b");
    g.addColorStop(1, "#0a1628");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Subtle vignette dots (static-ish noise field)
    ctx.fillStyle = "rgba(255,255,255,0.015)";
    for (let i = 0; i < 40; i++) {
      const x = ((i * 97) % W);
      const y = ((i * 53) % H);
      ctx.beginPath();
      ctx.arc(x, y, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawAttractionField() {
    if (!mouse.down && attractPulse < 0.02) return;
    const alpha = mouse.down ? 0.22 : attractPulse * 0.12;
    const r = ATTRACT_RADIUS * (0.85 + 0.15 * Math.sin(performance.now() * 0.008));
    const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, r);
    g.addColorStop(0, `rgba(94, 200, 255, ${alpha})`);
    g.addColorStop(0.5, `rgba(124, 245, 200, ${alpha * 0.35})`);
    g.addColorStop(1, "rgba(94, 200, 255, 0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, r, 0, Math.PI * 2);
    ctx.fill();

    // ring
    ctx.strokeStyle = `rgba(124, 245, 200, ${alpha * 1.4})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, r * 0.92, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawShockwaves() {
    for (const sw of shockwaves) {
      const a = Math.max(0, sw.life);
      ctx.strokeStyle = `rgba(255, 200, 120, ${a * 0.7})`;
      ctx.lineWidth = 3 * a;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255, 120, 80, ${a * 0.35})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r * 0.7, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawBalls() {
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      // soft glow
      if (b.glow > 0.05) {
        const gg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.4);
        gg.addColorStop(0, hexAlpha(b.color, 0.35 * b.glow));
        gg.addColorStop(1, hexAlpha(b.color, 0));
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 2.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // body with light highlight
      const body = ctx.createRadialGradient(
        b.x - b.r * 0.35,
        b.y - b.r * 0.4,
        b.r * 0.1,
        b.x,
        b.y,
        b.r
      );
      body.addColorStop(0, lighten(b.color, 0.45));
      body.addColorStop(0.55, b.color);
      body.addColorStop(1, darken(b.color, 0.25));
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();

      // specular
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.ellipse(
        b.x - b.r * 0.3,
        b.y - b.r * 0.35,
        b.r * 0.28,
        b.r * 0.18,
        -0.5,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  }

  function hexAlpha(hex, a) {
    const c = hexToRgb(hex);
    return `rgba(${c.r},${c.g},${c.b},${a})`;
  }

  function hexToRgb(hex) {
    const h = hex.replace("#", "");
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16),
    };
  }

  function lighten(hex, t) {
    const c = hexToRgb(hex);
    const r = (c.r + (255 - c.r) * t) | 0;
    const g = (c.g + (255 - c.g) * t) | 0;
    const b = (c.b + (255 - c.b) * t) | 0;
    return `rgb(${r},${g},${b})`;
  }

  function darken(hex, t) {
    const c = hexToRgb(hex);
    const r = (c.r * (1 - t)) | 0;
    const g = (c.g * (1 - t)) | 0;
    const b = (c.b * (1 - t)) | 0;
    return `rgb(${r},${g},${b})`;
  }

  function drawCursor() {
    const t = performance.now() * 0.004;
    const r = 6 + Math.sin(t) * 1.5;
    ctx.strokeStyle = mouse.down
      ? "rgba(124, 245, 200, 0.9)"
      : "rgba(255, 255, 255, 0.45)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = mouse.down
      ? "rgba(124, 245, 200, 0.35)"
      : "rgba(255, 255, 255, 0.15)";
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function render() {
    drawBackground();
    drawAttractionField();
    drawShockwaves();
    drawBalls();
    drawCursor();
  }

  // ── Main loop (rAF @ display refresh, ~60fps) ──────────────────
  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    step(dt);
    render();
    requestAnimationFrame(frame);
  }

  // ── Input ──────────────────────────────────────────────────────
  // Hold (≥ HOLD_MS) = attract nearby balls toward cursor
  // Click (release before HOLD_MS) = explosion / repulsion
  let pointerDownAt = 0;

  function setMouseFromEvent(e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  }

  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    setMouseFromEvent(e);
    mouse.down = true;
    pointerDownAt = performance.now();
  });

  canvas.addEventListener("pointermove", (e) => {
    setMouseFromEvent(e);
  });

  canvas.addEventListener("pointerup", (e) => {
    setMouseFromEvent(e);
    const held = performance.now() - pointerDownAt;
    // Short press = click → explode; long press was attraction only
    if (held < HOLD_MS) {
      explode();
    }
    mouse.down = false;
  });

  canvas.addEventListener("pointercancel", () => {
    mouse.down = false;
  });

  canvas.addEventListener("contextmenu", (e) => e.preventDefault());

  window.addEventListener("resize", resize);

  spawnBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    spawn(50, false);
  });

  // ── Boot ───────────────────────────────────────────────────────
  resize();
  mouse.x = W / 2;
  mouse.y = H / 3;
  spawn(40, false);
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
