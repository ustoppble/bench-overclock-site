<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Solar 3D Interativo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaf0;
  }
  #scene { display: block; width: 100%; height: 100%; cursor: grab; }
  #scene:active { cursor: grabbing; }

  /* Painel de ajuda / controles */
  #help {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(10, 14, 28, 0.72);
    border: 1px solid rgba(120, 150, 220, 0.25);
    backdrop-filter: blur(8px);
    border-radius: 12px; padding: 14px 16px; font-size: 13px; line-height: 1.55;
    max-width: 250px;
  }
  #help h1 { font-size: 15px; margin-bottom: 8px; letter-spacing: .3px; color: #8fb6ff; }
  #help .row { display: flex; justify-content: space-between; gap: 10px; }
  #help kbd {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: monospace;
  }
  #help .muted { color: #8b93a7; font-size: 11px; margin-top: 8px; }

  /* Tooltip de hover */
  #tooltip {
    position: fixed; z-index: 12; pointer-events: none;
    background: rgba(10, 14, 28, 0.9);
    border: 1px solid rgba(120, 150, 220, 0.4);
    border-radius: 8px; padding: 5px 10px; font-size: 12px;
    transform: translate(12px, 12px);
    display: none; white-space: nowrap;
  }

  /* Painel de detalhes do astro */
  #info {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    width: 290px;
    background: rgba(10, 14, 28, 0.82);
    border: 1px solid rgba(120, 150, 220, 0.3);
    backdrop-filter: blur(10px);
    border-radius: 14px; padding: 18px;
    display: none;
  }
  #info .head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  #info .swatch { width: 26px; height: 26px; border-radius: 50%; flex: 0 0 26px; box-shadow: 0 0 14px rgba(0,0,0,0.5); }
  #info h2 { font-size: 19px; font-weight: 600; }
  #info .type { font-size: 11px; color: #8b93a7; text-transform: uppercase; letter-spacing: 1px; }
  #info .grid { display: grid; grid-template-columns: 1fr auto; gap: 7px 12px; font-size: 13px; }
  #info .grid .k { color: #8b93a7; }
  #info .grid .v { color: #e8eaf0; text-align: right; font-variant-numeric: tabular-nums; }
  #info .desc { font-size: 12.5px; line-height: 1.5; color: #c2c8d8; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
  #info .close {
    position: absolute; top: 10px; right: 12px; cursor: pointer;
    color: #8b93a7; font-size: 18px; line-height: 1; background: none; border: none;
  }
  #info .close:hover { color: #fff; }

  /* Carregando */
  #loading {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: #000; color: #8fb6ff; font-size: 14px; letter-spacing: 1px;
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="help">
    <h1>🚀 Sistema Solar 3D</h1>
    <div class="row"><span>Olhar</span><span><kbd>Arrastar mouse</kbd></span></div>
    <div class="row"><span>Mover</span><span><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></span></div>
    <div class="row"><span>Subir / Descer</span><span><kbd>Espaço</kbd> <kbd>Shift</kbd></span></div>
    <div class="row"><span>Zoom</span><span><kbd>Scroll</kbd></span></div>
    <div class="row"><span>Selecionar</span><span><kbd>Clique</kbd></span></div>
    <div class="muted">Tamanhos e distâncias fora de escala para visualização.</div>
  </div>

  <div id="tooltip"></div>

  <div id="info">
    <button class="close" id="infoClose">×</button>
    <div class="head">
      <div class="swatch" id="infoSwatch"></div>
      <div>
        <h2 id="infoName">—</h2>
        <div class="type" id="infoType">—</div>
      </div>
    </div>
    <div class="grid" id="infoGrid"></div>
    <div class="desc" id="infoDesc"></div>
  </div>

  <div id="loading">Carregando o cosmos…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    /* =========================================================
       Dados dos astros (valores reais p/ exibição + escala 3D)
       ========================================================= */
    const ASTROS = [
      {
        name: 'Sol', type: 'Estrela (anã amarela)', isSun: true,
        radius: 4.6, color: 0xffb238, emissive: 0xff7b00,
        data: {
          'Diâmetro': '1.392.700 km',
          'Massa': '1,989 × 10³⁰ kg',
          'Temperatura (superfície)': '5.500 °C',
          'Temperatura (núcleo)': '15.000.000 °C',
          'Idade': '4,6 bilhões de anos',
          'Composição': '73% H · 25% He',
        },
        desc: 'A estrela central do sistema. Contém 99,86% de toda a massa do sistema solar; sua gravidade mantém os planetas em órbita.'
      },
      {
        name: 'Mercúrio', type: 'Planeta rochoso',
        radius: 0.36, color: 0x9c9085, orbit: 7.0, tilt: 0.03,
        periodDays: 88, dayHours: 1407.6,
        data: {
          'Diâmetro': '4.879 km',
          'Distância do Sol': '57,9 mi km',
          'Período orbital': '88 dias',
          'Período de rotação': '58,6 dias',
          'Gravidade': '3,7 m/s²',
          'Luas': '0',
        },
        desc: 'O menor planeta e o mais próximo do Sol. Extremos térmicos imensos: de −173 °C à noite a 427 °C de dia.'
      },
      {
        name: 'Vênus', type: 'Planeta rochoso',
        radius: 0.56, color: 0xe3c074, orbit: 8.2, tilt: 3.1,
        periodDays: 224.7, dayHours: 5832.5,
        data: {
          'Diâmetro': '12.104 km',
          'Distância do Sol': '108,2 mi km',
          'Período orbital': '224,7 dias',
          'Período de rotação': '243 dias',
          'Gravidade': '8,9 m/s²',
          'Luas': '0',
        },
        desc: 'O planeta mais quente (462 °C) por causa de um efeito estufa descontrolado. Gira no sentido contrário aos demais.'
      },
      {
        name: 'Terra', type: 'Planeta rochoso',
        radius: 0.60, color: 0x2b6fd6, orbit: 9.6, tilt: 0.41,
        periodDays: 365.25, dayHours: 24,
        data: {
          'Diâmetro': '12.742 km',
          'Distância do Sol': '149,6 mi km',
          'Período orbital': '365,25 dias',
          'Período de rotação': '24 horas',
          'Gravidade': '9,8 m/s²',
          'Luas': '1 (Lua)',
        },
        desc: 'Nosso lar. O único mundo conhecido com vida e água líquida em superfície.'
      },
      {
        name: 'Marte', type: 'Planeta rochoso',
        radius: 0.43, color: 0xc1502a, orbit: 11.2, tilt: 0.44,
        periodDays: 687, dayHours: 24.6,
        data: {
          'Diâmetro': '6.779 km',
          'Distância do Sol': '227,9 mi km',
          'Período orbital': '687 dias',
          'Período de rotação': '24,6 horas',
          'Gravidade': '3,7 m/s²',
          'Luas': '2 (Fobos, Deimos)',
        },
        desc: 'O "planeta vermelho", colorido por óxido de ferro. Possui o maior vulcão do sistema solar, o Olympus Mons.'
      },
      {
        name: 'Júpiter', type: 'Gigante gasoso',
        radius: 2.2, color: 0xd2a679, orbit: 18.0, tilt: 0.05,
        periodDays: 4333, dayHours: 9.9, bands: true,
        data: {
          'Diâmetro': '139.820 km',
          'Distância do Sol': '778,5 mi km',
          'Período orbital': '11,9 anos',
          'Período de rotação': '9,9 horas',
          'Gravidade': '24,8 m/s²',
          'Luas': '95',
        },
        desc: 'O maior planeta. Sua Grande Mancha Vermelha é uma tempestade maior que a Terra, ativa há séculos.'
      },
      {
        name: 'Saturno', type: 'Gigante gasoso',
        radius: 1.9, color: 0xe3dccb, orbit: 26.5, tilt: 0.47, ring: true,
        periodDays: 10759, dayHours: 10.7,
        data: {
          'Diâmetro': '116.460 km',
          'Distância do Sol': '1,43 bi km',
          'Período orbital': '29,5 anos',
          'Período de rotação': '10,7 horas',
          'Gravidade': '10,4 m/s²',
          'Luas': '146',
        },
        desc: 'Famoso pelo sistema de anéis espetaculares, formados por gelo e rocha. É o planeta menos denso — flutuaria na água.'
      },
      {
        name: 'Urano', type: 'Gigante de gelo',
        radius: 1.15, color: 0x9ee2e3, orbit: 40.0, tilt: 1.71, ring: true,
        periodDays: 30687, dayHours: 17.2,
        data: {
          'Diâmetro': '50.724 km',
          'Distância do Sol': '2,87 bi km',
          'Período orbital': '84 anos',
          'Período de rotação': '17,2 horas',
          'Gravidade': '8,7 m/s²',
          'Luas': '27',
        },
        desc: 'Gira "de lado", com eixo inclinado em 98°. Sua coloração cian vem do metano na atmosfera.'
      },
      {
        name: 'Netuno', type: 'Gigante de gelo',
        radius: 1.10, color: 0x3a5ce0, orbit: 56.0, tilt: 0.49,
        periodDays: 60190, dayHours: 16.1,
        data: {
          'Diâmetro': '49.244 km',
          'Distância do Sol': '4,50 bi km',
          'Período orbital': '165 anos',
          'Período de rotação': '16,1 horas',
          'Gravidade': '11,0 m/s²',
          'Luas': '14',
        },
        desc: 'O planeta mais distante. Tem os ventos mais rápidos do sistema solar, acima de 2.000 km/h.'
      },
    ];

    /* =========================================================
       Cena, câmera, renderizador
       ========================================================= */
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x01020a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 6000);
    camera.position.set(0, 55, 110);

    // Iluminação: o Sol emite luz; leve ambiente p/ não ter lados pretos puros.
    const ambient = new THREE.AmbientLight(0xffffff, 0.10);
    scene.add(ambient);
    const sunLight = new THREE.PointLight(0xfff2d8, 3.0, 0, 1.1);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    /* =========================================================
       Campo de estrelas
       ========================================================= */
    function buildStars(count = 9000) {
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const c = new THREE.Color();
      for (let i = 0; i < count; i++) {
        // Distribui numa casca esférica grande
        const r = 1200 + Math.random() * 1800;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        // Leve variação de cor (branco/azulado/amarelado)
        const t = Math.random();
        if (t < 0.7) c.setHSL(0.6, 0.1, 0.7 + Math.random() * 0.3);
        else if (t < 0.9) c.setHSL(0.1, 0.4, 0.7 + Math.random() * 0.3);
        else c.setHSL(0.0, 0.5, 0.7 + Math.random() * 0.3);
        colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.PointsMaterial({
        size: 1.4, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.95
      });
      const stars = new THREE.Points(geo, mat);
      scene.add(stars);
      return stars;
    }
    const starField = buildStars();

    /* =========================================================
       Sol + glow
       ========================================================= */
    function makeGlowTexture() {
      const size = 256;
      const cv = document.createElement('canvas');
      cv.width = cv.height = size;
      const ctx = cv.getContext('2d');
      const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      g.addColorStop(0.0, 'rgba(255,235,170,1)');
      g.addColorStop(0.2, 'rgba(255,180,70,0.55)');
      g.addColorStop(0.5, 'rgba(255,120,20,0.18)');
      g.addColorStop(1.0, 'rgba(255,120,20,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(cv);
    }

    const pickables = [];
    ASTROS.forEach((astro) => {
      if (astro.isSun) {
        const geo = new THREE.SphereGeometry(astro.radius, 64, 64);
        const mat = new THREE.MeshBasicMaterial({ color: astro.color });
        const sun = new THREE.Mesh(geo, mat);
        sun.userData = { astro };
        scene.add(sun);
        pickables.push(sun);

        // Halo
        const glowMat = new THREE.SpriteMaterial({
          map: makeGlowTexture(), color: 0xffaa44, transparent: true,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        const glow = new THREE.Sprite(glowMat);
        glow.scale.set(astro.radius * 7, astro.radius * 7, 1);
        scene.add(glow);
        return;
      }
    });

    /* =========================================================
       Planetas + órbitas
       ========================================================= */
    // Escala de tempo: 1 ano terrestre = 40s na simulação.
    const SECONDS_PER_DAY = 40 / 365.25;

    const planets = [];
    ASTROS.forEach((astro) => {
      if (astro.isSun) return;

      // Esfera do planeta
      const geo = new THREE.SphereGeometry(astro.radius, 48, 48);
      const mat = new THREE.MeshStandardMaterial({
        color: astro.color, roughness: 0.85, metalness: 0.0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData = { astro };
      scene.add(mesh);
      pickables.push(mesh);

      // Inclinação axial + rotação própria
      mesh.rotation.z = astro.tilt || 0;

      // Anéis (Saturno / Urano)
      let ring = null;
      if (astro.ring) {
        const inner = astro.radius * 1.4;
        const outer = astro.radius * 2.3;
        const ringGeo = new THREE.RingGeometry(inner, outer, 96);
        const ringMat = new THREE.MeshBasicMaterial({
          color: 0xd8d2c0, side: THREE.DoubleSide,
          transparent: true, opacity: astro.name === 'Urano' ? 0.35 : 0.7
        });
        ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2 - (astro.tilt || 0);
        mesh.add(ring);
      }

      // Linha da órbita
      const orbitPoints = [];
      const segs = 160;
      for (let i = 0; i <= segs; i++) {
        const a = (i / segs) * Math.PI * 2;
        orbitPoints.push(new THREE.Vector3(Math.cos(a) * astro.orbit, 0, Math.sin(a) * astro.orbit));
      }
      const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
      const orbitMat = new THREE.LineBasicMaterial({ color: 0x2a3554, transparent: true, opacity: 0.55 });
      const orbitLine = new THREE.Line(orbitGeo, orbitMat);
      scene.add(orbitLine);

      // Ângulo inicial aleatório p/ espalhar os planetas
      const angle0 = Math.random() * Math.PI * 2;

      planets.push({
        astro, mesh, ring,
        angle: angle0,
        angularSpeed: (Math.PI * 2) / (astro.periodDays * SECONDS_PER_DAY),
        spinSpeed: (Math.PI * 2) / (astro.dayHours * SECONDS_PER_DAY / 24),
      });
    });

    /* =========================================================
       Controles de voo (mouse + WASD + scroll)
       ========================================================= */
    let yaw = 0;          // rotação horizontal
    let pitch = -0.46;    // rotação vertical (olha um pouco para baixo)
    const keys = {};

    function applyRotation() {
      const e = new THREE.Euler(pitch, yaw, 0, 'YXZ');
      camera.quaternion.setFromEuler(e);
    }
    applyRotation();

    // --- Mouse: arrastar para olhar ---
    let dragging = false;
    let lastX = 0, lastY = 0, downX = 0, downY = 0, movedDist = 0;
    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      lastX = downX = e.clientX; lastY = downY = e.clientY; movedDist = 0;
    });
    window.addEventListener('mousemove', (e) => {
      // hover (tooltip) quando não está arrastando
      if (!dragging) { updateHover(e); return; }
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      movedDist += Math.abs(dx) + Math.abs(dy);
      const sens = 0.0028;
      yaw   -= dx * sens;
      pitch -= dy * sens;
      const lim = Math.PI / 2 - 0.02;
      pitch = Math.max(-lim, Math.min(lim, pitch));
      applyRotation();
    });
    window.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      // Se quase não moveu, considera clique (seleção)
      if (movedDist < 5) handleClick(e);
    });

    // --- Teclado ---
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if (k === ' ' || k === 'shift') e.preventDefault();
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    // --- Zoom com scroll (dolly ao longo da visão) ---
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      camera.position.addScaledVector(fwd, -e.deltaY * 0.04);
    }, { passive: false });

    /* =========================================================
       Interação: raycaster (hover + clique)
       ========================================================= */
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    const tooltip = document.getElementById('tooltip');

    function pick(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObjects(pickables, false);
      return hits.length ? hits[0].object : null;
    }

    function updateHover(e) {
      const obj = pick(e.clientX, e.clientY);
      if (obj) {
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
        tooltip.textContent = obj.userData.astro.name;
        canvas.style.cursor = 'pointer';
      } else {
        tooltip.style.display = 'none';
        canvas.style.cursor = dragging ? 'grabbing' : 'grab';
      }
    }

    // Painel de detalhes
    const info = document.getElementById('info');
    const infoName = document.getElementById('infoName');
    const infoType = document.getElementById('infoType');
    const infoSwatch = document.getElementById('infoSwatch');
    const infoGrid = document.getElementById('infoGrid');
    const infoDesc = document.getElementById('infoDesc');
    document.getElementById('infoClose').addEventListener('click', () => info.style.display = 'none');

    function handleClick(e) {
      const obj = pick(e.clientX, e.clientY);
      if (!obj) return;
      const astro = obj.userData.astro;
      const hex = '#' + astro.color.toString(16).padStart(6, '0');
      infoName.textContent = astro.name;
      infoType.textContent = astro.type;
      infoSwatch.style.background = hex;
      infoSwatch.style.boxShadow = `0 0 16px ${hex}`;
      infoGrid.innerHTML = '';
      for (const [k, v] of Object.entries(astro.data)) {
        const dk = document.createElement('div'); dk.className = 'k'; dk.textContent = k;
        const dv = document.createElement('div'); dv.className = 'v'; dv.textContent = v;
        infoGrid.appendChild(dk); infoGrid.appendChild(dv);
      }
      infoDesc.textContent = astro.desc;
      info.style.display = 'block';
    }

    /* =========================================================
       Loop principal
       ========================================================= */
    const clock = new THREE.Clock();
    const moveSpeed = 28;       // unidades/seg
    const tmpFwd = new THREE.Vector3();
    const tmpRight = new THREE.Vector3();
    const worldUp = new THREE.Vector3(0, 1, 0);

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // Movimento WASD relativo à câmera (frente segue a visão)
      tmpFwd.set(0, 0, -1).applyQuaternion(camera.quaternion);
      tmpRight.crossVectors(tmpFwd, worldUp).normalize();
      const sp = moveSpeed * dt;
      if (keys['w']) camera.position.addScaledVector(tmpFwd, sp);
      if (keys['s']) camera.position.addScaledVector(tmpFwd, -sp);
      if (keys['d']) camera.position.addScaledVector(tmpRight, sp);
      if (keys['a']) camera.position.addScaledVector(tmpRight, -sp);
      if (keys[' ']) camera.position.y += sp;
      if (keys['shift']) camera.position.y -= sp;

      // Planetas: translação + rotação própria
      for (const p of planets) {
        p.angle += p.angularSpeed * dt;
        p.mesh.position.set(
          Math.cos(p.angle) * p.astro.orbit, 0, Math.sin(p.angle) * p.astro.orbit
        );
        p.mesh.rotation.y += p.spinSpeed * dt;
      }

      // Rotação lenta do campo de estrelas p/ dar profundidade
      starField.rotation.y += dt * 0.003;

      renderer.render(scene, camera);
    }

    // Esconde tela de carregamento e inicia
    document.getElementById('loading').style.display = 'none';
    animate();

    /* =========================================================
       Resize
       ========================================================= */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
