<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulação de Física — Bolinhas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a12; font-family: system-ui, sans-serif; }
  canvas { display: block; }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  button {
    padding: 10px 22px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    color: #e0e0e8;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    user-select: none;
  }
  button:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.25);
  }
  button:active {
    transform: scale(0.96);
  }

  #stats {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    font-family: monospace;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="stats"></div>

<div id="controls">
  <button id="btnAdd">+ 50 bolinhas</button>
  <button id="btnClear">Limpar</button>
</div>

<script>
// ─── Configuração ───────────────────────────────────────────────
const GRAVITY       = 580;
const WALL_DAMPING  = 0.72;
const BALL_DAMPING  = 0.96;
const ATTRACT_RADIUS = 180;
const ATTRACT_FORCE = 18000;
const EXPLOSION_FORCE = 1200;
const EXPLOSION_RADIUS = 220;
const SUBSTEPS      = 3;          // colisões mais estáveis
const MAX_SPEED     = 1400;
const MIN_R = 8;
const MAX_R = 22;

// ─── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Cores vibrantes (HSL p/ facilitar variação) ────────────────
const PALETTE_HUES = [0, 25, 45, 140, 195, 260, 310, 340];

function randomColor() {
  const h = PALETTE_HUES[Math.floor(Math.random() * PALETTE_HUES.length)] + (Math.random() - 0.5) * 20;
  const s = 70 + Math.random() * 25;
  const l = 55 + Math.random() * 15;
  return { h, s, l, str: `hsl(${h},${s}%,${l}%)` };
}

// ─── Bolinha ─────────────────────────────────────────────────────
class Ball {
  constructor(x, y, r) {
    this.x = x;
    this.y = y;
    this.r = r || MIN_R + Math.random() * (MAX_R - MIN_R);
    this.mass = this.r * this.r;          // proporcional à área
    this.vx = (Math.random() - 0.5) * 200;
    this.vy = (Math.random() - 0.5) * 100;
    this.color = randomColor();
    this.glow = 0;                         // brilho ao sofrer explosão
  }
}

// ─── Estado ──────────────────────────────────────────────────────
let balls = [];
const mouse = { x: -9999, y: -9999, down: false, clicked: false };

// ─── Spawna N bolinhas no topo ──────────────────────────────────
function spawnBalls(n) {
  for (let i = 0; i < n; i++) {
    const x = 60 + Math.random() * (W - 120);
    const y = -20 - Math.random() * 300;
    balls.push(new Ball(x, y));
  }
}
spawnBalls(40);

// ─── Input ──────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) { mouse.down = true; mouse.clicked = true; }
});
canvas.addEventListener('mouseup',   () => { mouse.down = false; });
canvas.addEventListener('mouseleave',() => { mouse.x = -9999; mouse.y = -9999; mouse.down = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
  mouse.down = true; mouse.clicked = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.down = false; mouse.x = -9999; mouse.y = -9999; });

document.getElementById('btnAdd').addEventListener('click', () => spawnBalls(50));
document.getElementById('btnClear').addEventListener('click', () => { balls = []; });

// ─── Física ─────────────────────────────────────────────────────
function clampSpeed(b) {
  const s2 = b.vx * b.vx + b.vy * b.vy;
  if (s2 > MAX_SPEED * MAX_SPEED) {
    const s = Math.sqrt(s2);
    b.vx = (b.vx / s) * MAX_SPEED;
    b.vy = (b.vy / s) * MAX_SPEED;
  }
}

function resolveBallCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = a.r + b.r;
  if (dist >= minDist || dist < 0.001) return;

  // normal
  const nx = dx / dist;
  const ny = dy / dist;

  // separar
  const overlap = (minDist - dist) * 0.5;
  a.x -= nx * overlap;
  a.y -= ny * overlap;
  b.x += nx * overlap;
  b.y += ny * overlap;

  // velocidade relativa na normal
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const dvn = dvx * nx + dvy * ny;
  if (dvn <= 0) return;  // já se afastando

  const rest = WALL_DAMPING;
  const invMassSum = 1 / a.mass + 1 / b.mass;
  const j = -(1 + rest) * dvn / invMassSum;

  a.vx += (j / a.mass) * nx;
  a.vy += (j / a.mass) * ny;
  b.vx -= (j / b.mass) * nx;
  b.vy -= (j / b.mass) * ny;
}

function step(dt) {
  const n = balls.length;

  for (let i = 0; i < n; i++) {
    const b = balls[i];

    // gravidade
    b.vy += GRAVITY * dt;

    // atrair / repeler
    if (mouse.down || mouse.clicked) {
      const dx = mouse.x - b.x;
      const dy = mouse.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (mouse.down && dist < ATTRACT_RADIUS && dist > 1) {
        const f = ATTRACT_FORCE / (dist * dist) * dt;
        b.vx += (dx / dist) * f;
        b.vy += (dy / dist) * f;
      }

      if (mouse.clicked && dist < EXPLOSION_RADIUS && dist > 1) {
        const strength = EXPLOSION_FORCE * (1 - dist / EXPLOSION_RADIUS);
        b.vx -= (dx / dist) * strength;
        b.vy -= (dy / dist) * strength;
        b.glow = 1;
      }
    }

    // integrar posição
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    clampSpeed(b);

    // colisão com paredes
    if (b.x - b.r < 0)   { b.x = b.r;     b.vx =  Math.abs(b.vx) * WALL_DAMPING; }
    if (b.x + b.r > W)   { b.x = W - b.r; b.vx = -Math.abs(b.vx) * WALL_DAMPING; }
    if (b.y - b.r < 0)   { b.y = b.r;     b.vy =  Math.abs(b.vy) * WALL_DAMPING; }
    if (b.y + b.r > H)   { b.y = H - b.r; b.vy = -Math.abs(b.vy) * WALL_DAMPING; }

    // decair brilho
    b.glow *= 0.92;
  }

  // colisões entre bolinhas (O(n²) — ok até ~500)
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      resolveBallCollision(balls[i], balls[j]);
    }
  }
}

// ─── Render ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // fundo sutil gradiente
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#10101e');
  bg.addColorStop(1, '#06060c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // cursor indicator
  if (mouse.down && mouse.x > 0) {
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, ATTRACT_RADIUS, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(100,180,255,0.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // bolinhas
  for (const b of balls) {
    const { h, s, l, str } = b.color;

    // sombra / glow
    if (b.glow > 0.05) {
      ctx.save();
      ctx.shadowColor = str;
      ctx.shadowBlur = 30 * b.glow;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = str;
      ctx.fill();
      ctx.restore();
    }

    // gradiente radial pra efeito 3D
    const grad = ctx.createRadialGradient(
      b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1,
      b.x, b.y, b.r
    );
    grad.addColorStop(0, `hsl(${h},${s}%,${Math.min(l + 25, 95)}%)`);
    grad.addColorStop(0.7, str);
    grad.addColorStop(1, `hsl(${h},${s}%,${Math.max(l - 18, 15)}%)`);

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // highlight brilhante
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.28, b.r * 0.32, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
  }
}

// ─── Loop principal ──────────────────────────────────────────────
const statsEl = document.getElementById('stats');
let lastTime = 0;
let fpsSmooth = 60;
let frameCount = 0;

function loop(time) {
  requestAnimationFrame(loop);

  if (!lastTime) { lastTime = time; return; }
  let rawDt = (time - lastTime) / 1000;
  lastTime = time;

  // clamp dt pra evitar explosão ao voltar do background tab
  rawDt = Math.min(rawDt, 0.033);

  // substeps pra estabilidade
  const subDt = rawDt / SUBSTEPS;
  for (let s = 0; s < SUBSTEPS; s++) {
    step(subDt);
  }
  mouse.clicked = false;

  draw();

  // FPS
  frameCount++;
  fpsSmooth += (1 / Math.max(rawDt, 0.001) - fpsSmooth) * 0.1;
  if (frameCount % 15 === 0) {
    statsEl.textContent = `${balls.length} bolinhas · ${Math.round(fpsSmooth)} fps`;
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
