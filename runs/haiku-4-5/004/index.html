<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #0f0;
            border-radius: 50%;
            z-index: 10;
            opacity: 0.7;
        }
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -15px;
            width: 8px;
            height: 2px;
            background: #0f0;
            transform: translateY(-50%);
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            width: 2px;
            height: 8px;
            background: #0f0;
            transform: translateX(-50%);
        }
        #weapon-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #0f0;
            font-size: 16px;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Vida: <span id="health">100</span></div>
        <div>Abates: <span id="kills">0</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="weapon-info">
        <div id="weapon-name">Rifle</div>
        <div id="ammo">∞</div>
    </div>
    <div id="instructions">
        WASD: Mover | Mouse: Mirar | Clique: Disparar | 1/2: Trocar Arma | ESC: Sair
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Inicialização básica
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 200, 1000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 5, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(renderer.domElement);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(100, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.left = -200;
        directionalLight.shadow.camera.right = 200;
        directionalLight.shadow.camera.top = 200;
        directionalLight.shadow.camera.bottom = -200;
        scene.add(directionalLight);

        // Sistema de controle do jogador
        const player = {
            position: new THREE.Vector3(50, 5, 50),
            velocity: new THREE.Vector3(0, 0, 0),
            speed: 0.3,
            health: 100,
            kills: 0,
            width: 1,
            height: 2,
            depth: 1
        };

        camera.position.copy(player.position);

        const keys = {};
        const raycaster = new THREE.Raycaster();
        const mousePos = new THREE.Vector2();

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousemove', (e) => {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;

            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            euler.setFromQuaternion(camera.quaternion);
            euler.rotateY(- mousePos.x * 0.05);
            euler.rotateX(- mousePos.y * 0.05);
            camera.quaternion.setFromEuler(euler);
        });

        // Sistema de armas
        const weapons = {
            rifle: { name: 'Rifle', damage: 25, fireRate: 100, spread: 0.02 },
            rpg: { name: 'RPG', damage: 60, fireRate: 500, spread: 0.01, explosionRadius: 30 }
        };

        let currentWeapon = 'rifle';
        let lastFireTime = 0;
        let projectiles = [];
        let particles = [];

        document.addEventListener('click', () => {
            const now = Date.now();
            const weapon = weapons[currentWeapon];
            if (now - lastFireTime > weapon.fireRate) {
                fire();
                lastFireTime = now;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '1') currentWeapon = 'rifle';
            if (e.key === '2') currentWeapon = 'rpg';
        });

        function fire() {
            const weapon = weapons[currentWeapon];
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

            // Adiciona spread
            direction.x += (Math.random() - 0.5) * weapon.spread;
            direction.y += (Math.random() - 0.5) * weapon.spread;
            direction.normalize();

            projectiles.push({
                position: camera.position.clone().add(direction.multiplyScalar(5)),
                direction: direction,
                damage: weapon.damage,
                speed: 1,
                isExplosive: currentWeapon === 'rpg',
                explosionRadius: weapon.explosionRadius || 0,
                maxDistance: 500,
                distanceTraveled: 0
            });
        }

        // Mapa - paredes e cobertura
        const walls = [];

        function createWall(x, y, z, width, height, depth) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4a4a4a,
                roughness: 0.8
            });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set(x, y, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            walls.push({
                mesh: wall,
                x, y, z, width, height, depth
            });
        }

        // Criar mapa - arena com paredes e cobertura
        createWall(0, 0, 0, 150, 1, 150); // Chão
        createWall(-75, 10, 0, 2, 20, 150); // Parede oeste
        createWall(75, 10, 0, 2, 20, 150); // Parede leste
        createWall(0, 10, -75, 150, 20, 2); // Parede norte
        createWall(0, 10, 75, 150, 20, 2); // Parede sul

        // Cobertura no meio do mapa
        createWall(0, 5, 0, 30, 15, 30); // Estrutura central
        createWall(-50, 5, -50, 20, 15, 20); // Cobertura canto NO
        createWall(50, 5, -50, 20, 15, 20); // Cobertura canto NE
        createWall(-50, 5, 50, 20, 15, 20); // Cobertura canto SO
        createWall(50, 5, 50, 20, 15, 20); // Cobertura canto SE

        // Inimigos
        let enemies = [];
        let spawnTimer = 0;
        const spawnInterval = 120;

        function createEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const distance = 70;
            const x = player.position.x + Math.cos(angle) * distance;
            const z = player.position.z + Math.sin(angle) * distance;

            const geometry = new THREE.BoxGeometry(2, 3, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0xff4444 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, 3, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const enemy = {
                mesh: mesh,
                position: new THREE.Vector3(x, 3, z),
                health: 50,
                speed: 0.1,
                width: 2,
                height: 3,
                depth: 2
            };

            enemies.push(enemy);
        }

        // Sistema de partículas
        function createExplosion(position, radius) {
            for (let i = 0; i < 20; i++) {
                const angle = (Math.PI * 2 * i) / 20;
                const speed = 0.5;
                particles.push({
                    position: position.clone(),
                    velocity: new THREE.Vector3(
                        Math.cos(angle) * speed,
                        Math.random() * 0.5 + 0.3,
                        Math.sin(angle) * speed
                    ),
                    life: 60,
                    maxLife: 60
                });
            }
        }

        function createMuzzleFlash() {
            const light = new THREE.PointLight(0xffaa00, 2, 30);
            light.position.copy(camera.position);
            scene.add(light);
            setTimeout(() => scene.remove(light), 50);
        }

        // Detecção de colisão simples
        function checkCollision(pos1, size1, pos2, size2) {
            return (
                Math.abs(pos1.x - pos2.x) < (size1.x + size2.x) / 2 &&
                Math.abs(pos1.y - pos2.y) < (size1.y + size2.y) / 2 &&
                Math.abs(pos1.z - pos2.z) < (size1.z + size2.z) / 2
            );
        }

        function checkWallCollision(pos, width, height, depth) {
            for (let wall of walls) {
                if (checkCollision(
                    pos,
                    new THREE.Vector3(width, height, depth),
                    new THREE.Vector3(wall.x, wall.y, wall.z),
                    new THREE.Vector3(wall.width, wall.height, wall.depth)
                )) {
                    return true;
                }
            }
            return false;
        }

        // Loop de atualização
        function update() {
            // Movimento do jogador
            const direction = new THREE.Vector3();
            if (keys['w']) direction.z -= 1;
            if (keys['s']) direction.z += 1;
            if (keys['a']) direction.x -= 1;
            if (keys['d']) direction.x += 1;

            if (direction.length() > 0) {
                direction.normalize();
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

                const moveX = (forward.x * direction.z + right.x * direction.x) * player.speed;
                const moveZ = (forward.z * direction.z + right.z * direction.x) * player.speed;

                const newPos = player.position.clone();
                newPos.x += moveX;
                newPos.z += moveZ;

                if (!checkWallCollision(newPos, player.width, player.height, player.depth)) {
                    player.position.x += moveX;
                    player.position.z += moveZ;
                    camera.position.copy(player.position);
                }
            }

            // Atualizar inimigos
            spawnTimer++;
            if (spawnTimer > spawnInterval && enemies.length < 15) {
                createEnemy();
                spawnTimer = 0;
            }

            enemies.forEach((enemy, idx) => {
                const direction = player.position.clone().sub(enemy.position);
                direction.y = 0;
                direction.normalize();

                const moveX = direction.x * enemy.speed;
                const moveZ = direction.z * enemy.speed;

                const newPos = enemy.position.clone();
                newPos.x += moveX;
                newPos.z += moveZ;

                if (!checkWallCollision(newPos, enemy.width, enemy.height, enemy.depth)) {
                    enemy.position.x += moveX;
                    enemy.position.z += moveZ;
                    enemy.mesh.position.copy(enemy.position);
                }

                // Dano ao jogador
                if (checkCollision(
                    player.position,
                    new THREE.Vector3(player.width, player.height, player.depth),
                    enemy.position,
                    new THREE.Vector3(enemy.width, enemy.height, enemy.depth)
                )) {
                    player.health -= 0.1;
                }

                if (enemy.health <= 0) {
                    scene.remove(enemy.mesh);
                    enemies.splice(idx, 1);
                    player.kills++;
                }
            });

            // Atualizar projéteis
            projectiles.forEach((proj, idx) => {
                proj.position.add(proj.direction.clone().multiplyScalar(proj.speed));
                proj.distanceTraveled += proj.speed;

                if (proj.distanceTraveled > proj.maxDistance) {
                    projectiles.splice(idx, 1);
                    return;
                }

                // Verificar colisão com inimigos
                let hit = false;
                enemies.forEach((enemy) => {
                    if (checkCollision(
                        proj.position,
                        new THREE.Vector3(0.5, 0.5, 0.5),
                        enemy.position,
                        new THREE.Vector3(enemy.width, enemy.height, enemy.depth)
                    )) {
                        hit = true;
                        enemy.health -= proj.damage;

                        if (proj.isExplosive) {
                            createExplosion(proj.position, proj.explosionRadius);

                            // Dano em área
                            enemies.forEach((e) => {
                                const dist = proj.position.distanceTo(e.position);
                                if (dist < proj.explosionRadius) {
                                    e.health -= proj.damage * (1 - dist / proj.explosionRadius);
                                }
                            });
                        }
                    }
                });

                if (hit) {
                    createMuzzleFlash();
                    projectiles.splice(idx, 1);
                }
            });

            // Atualizar partículas
            particles.forEach((p, idx) => {
                p.position.add(p.velocity);
                p.velocity.y -= 0.01;
                p.life--;

                if (p.life <= 0) {
                    particles.splice(idx, 1);
                }
            });

            // Atualizar HUD
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
            document.getElementById('kills').textContent = player.kills;
            document.getElementById('weapon-name').textContent = weapons[currentWeapon].name;

            if (player.health <= 0) {
                document.getElementById('health').textContent = 'MORTO';
            }
        }

        // Loop de renderização
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // Lidar com redimensionamento da janela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar jogo
        animate();
    </script>
</body>
</html>
