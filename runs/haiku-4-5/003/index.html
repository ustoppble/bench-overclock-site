<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulação de Física Interativa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
    h1 {
      color: white;
      font-size: 24px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    canvas {
      border: 3px solid white;
      border-radius: 8px;
      background: linear-gradient(180deg, #0a0e27 0%, #16213e 100%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: all 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    button:active {
      transform: translateY(0);
    }
    .info {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simulação de Física Interativa</h1>
    <canvas id="canvas" width="900" height="600"></canvas>
    <div class="controls">
      <button id="addBalls">+ 50 Bolinhas</button>
      <button id="reset">Resetar</button>
    </div>
    <div class="info">
      🖱️ Segura: atrai • Clica: repele • Arrasta bolinhas para interagir
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const GRAVITY = 0.5;
    const DAMPING = 0.99;
    const ATTRACTION_STRENGTH = 0.15;
    const REPULSION_STRENGTH = 0.4;
    const REPULSION_RADIUS = 150;

    class Ball {
      constructor(x, y, radius = 8, color = null) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.radius = radius;
        this.mass = radius / 8;
        this.color = color || `hsl(${Math.random() * 360}, 70%, 55%)`;
      }

      update() {
        // Gravidade
        this.vy += GRAVITY;

        // Movimento
        this.x += this.vx;
        this.y += this.vy;

        // Amortecimento
        this.vx *= DAMPING;
        this.vy *= DAMPING;

        // Colisão com bordas
        if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx = Math.abs(this.vx) * 0.9;
        }
        if (this.x + this.radius > canvas.width) {
          this.x = canvas.width - this.radius;
          this.vx = -Math.abs(this.vx) * 0.9;
        }
        if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = Math.abs(this.vy) * 0.9;
        }
        if (this.y + this.radius > canvas.height) {
          this.y = canvas.height - this.radius;
          this.vy = -Math.abs(this.vy) * 0.8;
        }
      }

      applyForce(fx, fy) {
        this.vx += fx / this.mass;
        this.vy += fy / this.mass;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // Brilho sutil
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      distanceTo(other) {
        const dx = other.x - this.x;
        const dy = other.y - this.y;
        return Math.sqrt(dx * dx + dy * dy);
      }
    }

    let balls = [];
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    let mouseDown = false;

    function createInitialBalls() {
      balls = [];
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * (canvas.width - 40) + 20;
        const y = Math.random() * (canvas.height * 0.3) + 20;
        balls.push(new Ball(x, y));
      }
    }

    function addBalls() {
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * (canvas.width - 40) + 20;
        const y = Math.random() * (canvas.height * 0.2) + 20;
        balls.push(new Ball(x, y));
      }
    }

    function checkCollisions() {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const b1 = balls[i];
          const b2 = balls[j];
          const dist = b1.distanceTo(b2);
          const minDist = b1.radius + b2.radius;

          if (dist < minDist) {
            // Separar bolas
            const angle = Math.atan2(b2.y - b1.y, b2.x - b1.x);
            const overlap = minDist - dist;
            const moveX = Math.cos(angle) * overlap / 2;
            const moveY = Math.sin(angle) * overlap / 2;

            b1.x -= moveX;
            b1.y -= moveY;
            b2.x += moveX;
            b2.y += moveY;

            // Trocar velocidades (colisão elástica simplificada)
            const vx1 = b1.vx;
            const vy1 = b1.vy;

            b1.vx = b2.vx * 0.95;
            b1.vy = b2.vy * 0.95;
            b2.vx = vx1 * 0.95;
            b2.vy = vy1 * 0.95;
          }
        }
      }
    }

    function handleMouseAttraction() {
      if (!mouseDown) return;

      for (const ball of balls) {
        const dx = mouseX - ball.x;
        const dy = mouseY - ball.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 20) {
          const force = ATTRACTION_STRENGTH / dist;
          ball.applyForce(dx * force, dy * force);
        }
      }
    }

    function handleMouseRepulsion(x, y) {
      for (const ball of balls) {
        const dx = ball.x - x;
        const dy = ball.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < REPULSION_RADIUS && dist > 1) {
          const force = REPULSION_STRENGTH / (dist + 1);
          ball.applyForce((dx / dist) * force, (dy / dist) * force);
          ball.vy -= 0.5; // Impulso extra pra cima
        }
      }
    }

    function update() {
      // Atualizar bolinhas
      for (const ball of balls) {
        ball.update();
      }

      // Verificar colisões
      checkCollisions();

      // Atração do mouse
      handleMouseAttraction();
    }

    function draw() {
      // Limpar canvas
      ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Desenhar bolinhas
      for (const ball of balls) {
        ball.draw();
      }

      // Info de contagem
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Bolinhas: ${balls.length}`, 15, 25);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Event listeners
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', () => {
      mouseDown = true;
    });

    canvas.addEventListener('mouseup', () => {
      mouseDown = false;
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      handleMouseRepulsion(x, y);
    });

    document.getElementById('addBalls').addEventListener('click', addBalls);
    document.getElementById('reset').addEventListener('click', createInitialBalls);

    // Iniciar
    createInitialBalls();
    gameLoop();
  </script>
</body>
</html>
