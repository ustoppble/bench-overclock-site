<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Solar 3D Interativo</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  canvas {
    display: block;
  }
  #info {
    position: absolute;
    top: 12px;
    left: 12px;
    color: #d0e0ff;
    background: rgba(10, 15, 30, 0.55);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    border: 1px solid rgba(120, 160, 255, 0.25);
  }
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.6);
    pointer-events: none;
  }
  #panel {
    position: absolute;
    right: 20px;
    top: 20px;
    width: 280px;
    background: rgba(10, 15, 30, 0.75);
    border: 1px solid rgba(120, 160, 255, 0.35);
    border-radius: 10px;
    padding: 16px 18px;
    color: #e6eeff;
    display: none;
    box-shadow: 0 0 30px rgba(0, 100, 255, 0.15);
  }
  #panel h2 {
    margin: 0 0 8px 0;
    font-size: 20px;
    color: #ffd479;
  }
  #panel .row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding-bottom: 4px;
  }
  #panel .row span:first-child {
    color: #9fb3d9;
  }
  #panel .close-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    color: #9fb3d9;
    font-size: 16px;
  }
  #panel .close-btn:hover {
    color: #fff;
  }
</style>
</head>
<body>

<div id="info">
  <strong>Controles</strong><br>
  WASD — mover &nbsp; | &nbsp; Espaço/Shift — subir/descer<br>
  Mouse (clique e arraste) — olhar em volta<br>
  Roda do mouse — zoom (velocidade)<br>
  Clique em um planeta — ver dados
</div>

<div id="crosshair"></div>

<div id="panel">
  <div class="close-btn" onclick="closePanel()">✕</div>
  <h2 id="panel-name">-</h2>
  <div class="row"><span>Tipo</span><span id="panel-type">-</span></div>
  <div class="row"><span>Diâmetro</span><span id="panel-diameter">-</span></div>
  <div class="row"><span>Distância do Sol</span><span id="panel-distance">-</span></div>
  <div class="row"><span>Período orbital</span><span id="panel-period">-</span></div>
  <div class="row"><span>Luas</span><span id="panel-moons">-</span></div>
  <div id="panel-desc" style="margin-top:10px; font-size:12.5px; color:#c3d2f0; line-height:1.5;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ------------------------------------------------------------------
// Configuração básica
// ------------------------------------------------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 20000);
camera.position.set(0, 60, 220);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ------------------------------------------------------------------
// Estrelas de fundo
// ------------------------------------------------------------------
function createStarField() {
  const starGeo = new THREE.BufferGeometry();
  const starCount = 8000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const radius = 3000 + Math.random() * 5000;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    positions[i * 3]     = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = radius * Math.cos(phi);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.4, sizeAttenuation: true });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
}
createStarField();

// ------------------------------------------------------------------
// Luz
// ------------------------------------------------------------------
const sunLight = new THREE.PointLight(0xffffff, 2.2, 0, 0);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x222233, 0.4));

// ------------------------------------------------------------------
// Sol
// ------------------------------------------------------------------
const sunGeo = new THREE.SphereGeometry(14, 48, 48);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd66 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.userData = {
  name: 'Sol',
  type: 'Estrela (Anã Amarela G2V)',
  diameter: '1.392.700 km',
  distance: '0 km (centro)',
  period: '—',
  moons: '—',
  desc: 'Estrela central do Sistema Solar, responsável por 99,8% de toda a massa do sistema. Fusão nuclear de hidrogênio em hélio libera a energia que sustenta a vida na Terra.'
};
scene.add(sun);

// Glow simples do Sol (esfera adicional levemente maior e transparente)
const glowGeo = new THREE.SphereGeometry(17, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.25 });
scene.add(new THREE.Mesh(glowGeo, glowMat));

// ------------------------------------------------------------------
// Dados dos planetas (escala não-linear pra caber na tela, mas
// proporções relativas de tamanho/distância/velocidade preservadas)
// ------------------------------------------------------------------
const planetData = [
  {
    name: 'Mercúrio', color: 0x9c9c9c, radius: 1.6, distance: 28,
    orbitSpeed: 4.15, rotSpeed: 0.004,
    type: 'Planeta rochoso', diameter: '4.879 km', distanceReal: '57,9 milhões km',
    period: '88 dias terrestres', moons: '0',
    desc: 'O menor e mais próximo planeta do Sol. Superfície repleta de crateras, sem atmosfera relevante, com variação térmica extrema entre dia e noite.'
  },
  {
    name: 'Vênus', color: 0xe8c27e, radius: 2.4, distance: 40,
    orbitSpeed: 1.62, rotSpeed: -0.002,
    type: 'Planeta rochoso', diameter: '12.104 km', distanceReal: '108,2 milhões km',
    period: '225 dias terrestres', moons: '0',
    desc: 'Planeta mais quente do sistema devido ao efeito estufa extremo causado por sua densa atmosfera de CO₂. Gira em sentido retrógrado.'
  },
  {
    name: 'Terra', color: 0x2a6ee8, radius: 2.5, distance: 55,
    orbitSpeed: 1.0, rotSpeed: 0.02,
    type: 'Planeta rochoso', diameter: '12.742 km', distanceReal: '149,6 milhões km',
    period: '365,25 dias', moons: '1 (Lua)',
    desc: 'Único planeta conhecido com vida. Possui água líquida em abundância, atmosfera rica em oxigênio e um campo magnético protetor.'
  },
  {
    name: 'Marte', color: 0xc1440e, radius: 1.9, distance: 72,
    orbitSpeed: 0.53, rotSpeed: 0.018,
    type: 'Planeta rochoso', diameter: '6.779 km', distanceReal: '227,9 milhões km',
    period: '687 dias terrestres', moons: '2 (Fobos, Deimos)',
    desc: 'O "Planeta Vermelho", coloração dada por óxido de ferro na superfície. Abriga o Monte Olimpo, o maior vulcão do Sistema Solar.'
  },
  {
    name: 'Júpiter', color: 0xd8ac6c, radius: 7.5, distance: 100,
    orbitSpeed: 0.084, rotSpeed: 0.04,
    type: 'Gigante gasoso', diameter: '139.820 km', distanceReal: '778,5 milhões km',
    period: '11,86 anos terrestres', moons: '95 conhecidas',
    desc: 'O maior planeta do sistema. Sua Grande Mancha Vermelha é uma tempestade anticiclônica ativa há séculos.'
  },
  {
    name: 'Saturno', color: 0xead6a5, radius: 6.4, distance: 138,
    orbitSpeed: 0.034, rotSpeed: 0.038, hasRings: true,
    type: 'Gigante gasoso', diameter: '116.460 km', distanceReal: '1,43 bilhão km',
    period: '29,45 anos terrestres', moons: '146 conhecidas',
    desc: 'Famoso por seu extenso sistema de anéis, compostos majoritariamente de gelo e rocha. É o planeta menos denso do sistema.'
  },
  {
    name: 'Urano', color: 0x9fe3e8, radius: 4.2, distance: 176,
    orbitSpeed: 0.012, rotSpeed: 0.03,
    type: 'Gigante de gelo', diameter: '50.724 km', distanceReal: '2,87 bilhões km',
    period: '84 anos terrestres', moons: '27 conhecidas',
    desc: 'Gira praticamente deitado, com eixo de rotação inclinado a quase 98°. Sua coloração azul-esverdeada vem do metano atmosférico.'
  },
  {
    name: 'Netuno', color: 0x3b5fe8, radius: 4.0, distance: 210,
    orbitSpeed: 0.006, rotSpeed: 0.032,
    type: 'Gigante de gelo', diameter: '49.244 km', distanceReal: '4,50 bilhões km',
    period: '164,8 anos terrestres', moons: '16 conhecidas',
    desc: 'O planeta mais distante do Sol, com os ventos mais fortes já registrados no Sistema Solar, ultrapassando 2.000 km/h.'
  }
];

const planets = [];

planetData.forEach(data => {
  const orbitGroup = new THREE.Object3D();
  orbitGroup.rotation.y = Math.random() * Math.PI * 2;
  scene.add(orbitGroup);

  const geo = new THREE.SphereGeometry(data.radius, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.8, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = data.distance;
  mesh.userData = {
    name: data.name,
    type: data.type,
    diameter: data.diameter,
    distance: data.distanceReal,
    period: data.period,
    moons: data.moons,
    desc: data.desc
  };
  orbitGroup.add(mesh);

  if (data.hasRings) {
    const ringGeo = new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xd8c9a3, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2.2;
    mesh.add(ring);
  }

  // Linha de órbita (visualização)
  const orbitPoints = [];
  const segments = 128;
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    orbitPoints.push(new THREE.Vector3(Math.cos(a) * data.distance, 0, Math.sin(a) * data.distance));
  }
  const orbitLineGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
  const orbitLineMat = new THREE.LineBasicMaterial({ color: 0x556688, transparent: true, opacity: 0.35 });
  scene.add(new THREE.LineLoop(orbitLineGeo, orbitLineMat));

  planets.push({ mesh, orbitGroup, orbitSpeed: data.orbitSpeed, rotSpeed: data.rotSpeed });
});

// ------------------------------------------------------------------
// Voo livre (WASD + mouse look) + zoom (roda do mouse ajusta velocidade)
// ------------------------------------------------------------------
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

let yaw = 0;
let pitch = 0;
let isDragging = false;
let lastX = 0, lastY = 0;

renderer.domElement.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  }
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  yaw -= dx * 0.003;
  pitch -= dy * 0.003;
  pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
});

let moveSpeed = 1.2;
window.addEventListener('wheel', e => {
  moveSpeed *= (e.deltaY > 0) ? 0.9 : 1.1;
  moveSpeed = Math.max(0.05, Math.min(20, moveSpeed));
});

function updateCamera() {
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  const forward = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
  const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);
  const up = new THREE.Vector3(0, 1, 0);

  const speed = moveSpeed;
  if (keys['KeyW']) camera.position.addScaledVector(forward, speed);
  if (keys['KeyS']) camera.position.addScaledVector(forward, -speed);
  if (keys['KeyA']) camera.position.addScaledVector(right, -speed);
  if (keys['KeyD']) camera.position.addScaledVector(right, speed);
  if (keys['Space']) camera.position.addScaledVector(up, speed);
  if (keys['ShiftLeft'] || keys['ShiftRight']) camera.position.addScaledVector(up, -speed);
}

// ------------------------------------------------------------------
// Clique em planeta -> exibir painel de dados
// ------------------------------------------------------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseDownPos = null;

renderer.domElement.addEventListener('mousedown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', e => {
  if (!mouseDownPos) return;
  const dist = Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y);
  mouseDownPos = null;
  if (dist > 4) return; // foi arraste (look), não clique

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = [sun, ...planets.map(p => p.mesh)];
  const intersects = raycaster.intersectObjects(targets, false);
  if (intersects.length > 0) {
    showPanel(intersects[0].object.userData);
  }
});

function showPanel(data) {
  document.getElementById('panel-name').textContent = data.name;
  document.getElementById('panel-type').textContent = data.type;
  document.getElementById('panel-diameter').textContent = data.diameter;
  document.getElementById('panel-distance').textContent = data.distance;
  document.getElementById('panel-period').textContent = data.period;
  document.getElementById('panel-moons').textContent = data.moons;
  document.getElementById('panel-desc').textContent = data.desc;
  document.getElementById('panel').style.display = 'block';
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
}
window.closePanel = closePanel;

// ------------------------------------------------------------------
// Loop de animação
// ------------------------------------------------------------------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  sun.rotation.y += 0.0015;

  planets.forEach(p => {
    p.orbitGroup.rotation.y += p.orbitSpeed * delta * 0.3;
    p.mesh.rotation.y += p.rotSpeed;
  });

  updateCamera();
  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
