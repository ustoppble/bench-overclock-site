<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gastos — controle simples</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <h1>Meus Gastos</h1>

  <form id="form-gasto" class="linha-form">
    <input id="campo-descricao" type="text" placeholder="Descrição" required>
    <input id="campo-valor" type="number" step="0.01" min="0.01" placeholder="Valor (R$)" required>
    <select id="campo-categoria" required>
      <option value="" disabled selected>Categoria</option>
      <option>Alimentação</option>
      <option>Transporte</option>
      <option>Lazer</option>
      <option>Moradia</option>
      <option>Outros</option>
    </select>
    <input id="campo-data" type="date" required>
    <button type="submit">Adicionar</button>
  </form>

  <div class="filtros">
    <label>Categoria:
      <select id="filtro-categoria">
        <option value="">Todas</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Moradia</option>
        <option>Outros</option>
      </select>
    </label>
    <label>De: <input id="filtro-data-de" type="date"></label>
    <label>Até: <input id="filtro-data-ate" type="date"></label>
  </div>

  <table id="tabela-gastos">
    <thead>
      <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th class="num">Valor</th><th></th></tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr><td colspan="3">Total (filtro atual)</td><td class="num" id="total"></td><td></td></tr>
    </tfoot>
  </table>
</main>
<script src="app.js"></script>
</body>
</html>
