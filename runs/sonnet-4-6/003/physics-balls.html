<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física Interativa — Bolinhas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 10;
    }
    button {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }
    button:hover { background: rgba(255,255,255,0.18); }
    button:active { transform: scale(0.96); }
    #hint {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
    }
    #count {
      position: fixed;
      top: 18px;
      right: 18px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Segure para atrair · Clique para repelir</div>
<div id="count"></div>
<div id="ui">
  <button id="btnAdd">+ 50 bolinhas</button>
  <button id="btnClear">Limpar</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('count');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Paleta ────────────────────────────────────────────────────
const PALETTE = [
  '#ff4d6d','#ff6b35','#ffd166','#06d6a0',
  '#118ab2','#a78bfa','#f72585','#4cc9f0',
  '#ff9f1c','#2ec4b6','#e040fb','#00b4d8',
];

// ── Estado do mouse ───────────────────────────────────────────
const mouse = { x: W/2, y: H/2, down: false };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('touchmove',  e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('mousedown', () => { mouse.down = true; });
canvas.addEventListener('touchstart', e => { mouse.down = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
canvas.addEventListener('mouseup',  () => { if (mouse.down) explode(); mouse.down = false; });
canvas.addEventListener('touchend', () => { if (mouse.down) explode(); mouse.down = false; });

// ── Física ────────────────────────────────────────────────────
const GRAVITY    = 0.35;
const DAMPING    = 0.78;   // quique na parede
const FRICTION   = 0.992;  // arrasto no ar
const ATTRACT_R  = 180;
const ATTRACT_F  = 0.55;
const REPEL_R    = 220;
const REPEL_F    = 18;
const GRID_CELL  = 60;     // resolução da grade de colisão

let balls = [];

class Ball {
  constructor(x, y, r, color) {
    this.x  = x ?? Math.random() * W;
    this.y  = y ?? Math.random() * -100;
    this.r  = r ?? 8 + Math.random() * 16;
    this.vx = (Math.random() - 0.5) * 3;
    this.vy = Math.random() * 2;
    this.color = color ?? PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.mass  = this.r * this.r;   // proporcional à área
    // Glow pré-calculado
    this._grad = null;
    this._lastR = -1;
  }

  gradient() {
    if (this.r !== this._lastR) {
      const g = ctx.createRadialGradient(-this.r*0.3,-this.r*0.3,0, 0,0,this.r);
      g.addColorStop(0, lighten(this.color, 0.6));
      g.addColorStop(0.5, this.color);
      g.addColorStop(1, darken(this.color, 0.4));
      this._grad = g;
      this._lastR = this.r;
    }
    return this._grad;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // sombra suave
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = this.r * 1.2;

    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.gradient();
    ctx.fill();

    ctx.restore();
  }

  update() {
    this.vy += GRAVITY;
    this.vx *= FRICTION;
    this.vy *= FRICTION;

    // Atração pelo mouse (hold)
    if (mouse.down) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < ATTRACT_R && dist > 1) {
        const f = ATTRACT_F * (1 - dist / ATTRACT_R);
        this.vx += (dx / dist) * f;
        this.vy += (dy / dist) * f;
      }
    }

    this.x += this.vx;
    this.y += this.vy;

    // Paredes
    if (this.x - this.r < 0) {
      this.x = this.r;
      this.vx = Math.abs(this.vx) * DAMPING;
    } else if (this.x + this.r > W) {
      this.x = W - this.r;
      this.vx = -Math.abs(this.vx) * DAMPING;
    }
    if (this.y - this.r < 0) {
      this.y = this.r;
      this.vy = Math.abs(this.vy) * DAMPING;
    } else if (this.y + this.r > H) {
      this.y = H - this.r;
      this.vy = -Math.abs(this.vy) * DAMPING;
    }
  }
}

// ── Colisão entre bolinhas ────────────────────────────────────
function resolveCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const minDist = a.r + b.r;
  if (dist >= minDist || dist < 0.001) return;

  // Separar
  const overlap = (minDist - dist) / 2;
  const nx = dx / dist, ny = dy / dist;
  a.x -= nx * overlap;
  a.y -= ny * overlap;
  b.x += nx * overlap;
  b.y += ny * overlap;

  // Impulso elástico
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const dot = dvx*nx + dvy*ny;
  if (dot > 0) return; // já se afastando

  const restitution = 0.82;
  const impulse = (-(1 + restitution) * dot) / (1/a.mass + 1/b.mass);
  a.vx += (impulse / a.mass) * nx;
  a.vy += (impulse / a.mass) * ny;
  b.vx -= (impulse / b.mass) * nx;
  b.vy -= (impulse / b.mass) * ny;
}

// Grade espacial para O(n) colisões
function buildGrid() {
  const grid = new Map();
  for (const b of balls) {
    const cx = Math.floor(b.x / GRID_CELL);
    const cy = Math.floor(b.y / GRID_CELL);
    const key = `${cx},${cy}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(b);
  }
  return grid;
}

function checkCollisions() {
  const grid = buildGrid();
  const checked = new Set();
  for (const [key, cell] of grid) {
    const [cx, cy] = key.split(',').map(Number);
    const neighbors = [];
    for (let nx = cx-1; nx <= cx+1; nx++)
      for (let ny = cy-1; ny <= cy+1; ny++)
        neighbors.push(...(grid.get(`${nx},${ny}`) || []));

    for (const a of cell) {
      for (const b of neighbors) {
        if (a === b) continue;
        const id = a < b ? `${balls.indexOf(a)}-${balls.indexOf(b)}` : `${balls.indexOf(b)}-${balls.indexOf(a)}`;
        if (checked.has(id)) continue;
        checked.add(id);
        resolveCollision(a, b);
      }
    }
  }
}

// ── Explosão ──────────────────────────────────────────────────
function explode() {
  for (const b of balls) {
    const dx = b.x - mouse.x;
    const dy = b.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < REPEL_R && dist > 0.001) {
      const f = REPEL_F * (1 - dist / REPEL_R);
      b.vx += (dx / dist) * f;
      b.vy += (dy / dist) * f;
    }
  }
  // anel visual
  rings.push({ x: mouse.x, y: mouse.y, r: 0, alpha: 1 });
}

// ── Efeito de anel ────────────────────────────────────────────
const rings = [];
function updateRings() {
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    ring.r     += 12;
    ring.alpha -= 0.035;
    if (ring.alpha <= 0) { rings.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${ring.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ── Spawn ─────────────────────────────────────────────────────
function spawnBalls(n) {
  for (let i = 0; i < n; i++) {
    balls.push(new Ball(
      30 + Math.random() * (W - 60),
      -20 - Math.random() * 300
    ));
  }
}

// Começa com 30 bolinhas
spawnBalls(30);

// ── Botões ───────────────────────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', () => spawnBalls(50));
document.getElementById('btnClear').addEventListener('click', () => { balls = []; });

// ── Loop principal ────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 32); // cap 32ms para não explodir
  lastTime = ts;

  // Limpar com rastro escuro (motion blur sutil)
  ctx.fillStyle = 'rgba(10,10,15,0.72)';
  ctx.fillRect(0, 0, W, H);

  // Glow de atração
  if (mouse.down) {
    const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, ATTRACT_R);
    grd.addColorStop(0, 'rgba(255,255,255,0.07)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  // Física
  for (const b of balls) b.update();
  checkCollisions();

  // Desenho
  for (const b of balls) b.draw();
  updateRings();

  // HUD
  countEl.textContent = `${balls.length} bolinhas`;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Helpers de cor ───────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lighten(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${Math.min(255,r+255*amt)|0},${Math.min(255,g+255*amt)|0},${Math.min(255,b+255*amt)|0})`;
}
function darken(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${Math.max(0,r-255*amt)|0},${Math.max(0,g-255*amt)|0},${Math.max(0,b-255*amt)|0})`;
}
</script>
</body>
</html>
