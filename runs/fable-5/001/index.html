<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: rgba(255,255,255,.85); font-size: 13px; line-height: 1.7;
    background: rgba(10,14,26,.65); backdrop-filter: blur(6px);
    padding: 14px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
    user-select: none; pointer-events: none;
  }
  #hud h1 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #fff; }
  #hud kbd {
    background: rgba(255,255,255,.15); border-radius: 4px; padding: 1px 6px;
    font-size: 11px; font-family: monospace; border: 1px solid rgba(255,255,255,.2);
  }

  #info {
    position: fixed; top: 16px; right: 16px; z-index: 10; width: 300px;
    color: #fff; background: rgba(10,14,26,.8); backdrop-filter: blur(8px);
    padding: 20px 22px; border-radius: 12px; border: 1px solid rgba(255,255,255,.15);
    transform: translateX(340px); transition: transform .35s ease;
  }
  #info.visible { transform: translateX(0); }
  #info h2 { font-size: 22px; margin-bottom: 2px; display: flex; align-items: center; gap: 10px; }
  #info .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  #info .subtitle { font-size: 12px; color: rgba(255,255,255,.55); margin-bottom: 14px; }
  #info table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #info td { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.08); }
  #info td:first-child { color: rgba(255,255,255,.6); }
  #info td:last-child { text-align: right; }
  #info .fact { margin-top: 12px; font-size: 12.5px; color: rgba(255,255,255,.75); font-style: italic; line-height: 1.5; }
  #info button {
    margin-top: 14px; width: 100%; padding: 7px; cursor: pointer;
    background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.25);
    border-radius: 6px; font-size: 13px;
  }
  #info button:hover { background: rgba(255,255,255,.22); }

  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5);
    pointer-events: none; z-index: 5;
  }
</style>
</head>
<body>
<div id="hud">
  <h1>Sistema Solar 3D</h1>
  <div><kbd>Arrastar mouse</kbd> olhar ao redor</div>
  <div><kbd>W A S D</kbd> voar &nbsp; <kbd>Q</kbd>/<kbd>E</kbd> descer/subir</div>
  <div><kbd>Shift</kbd> turbo &nbsp; <kbd>Scroll</kbd> zoom</div>
  <div><kbd>Clique</kbd> em um planeta para ver os dados</div>
</div>

<div id="info">
  <h2><span class="dot" id="info-dot"></span><span id="info-name"></span></h2>
  <div class="subtitle" id="info-sub"></div>
  <table id="info-table"></table>
  <div class="fact" id="info-fact"></div>
  <button id="info-close">Fechar</button>
</div>

<div id="crosshair"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- Cena básica ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 5000);
camera.position.set(0, 45, 130);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.12));
const sunLight = new THREE.PointLight(0xfff2d0, 2500, 0, 2);
scene.add(sunLight);

// ---------- Estrelas de fundo ----------
{
  const starGeo = new THREE.BufferGeometry();
  const N = 6000, pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    // pontos numa casca esférica distante
    const r = 1200 + Math.random() * 1800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi);
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const t = 0.7 + Math.random() * 0.3;
    col[i*3] = t; col[i*3+1] = t; col[i*3+2] = Math.min(1, t + Math.random() * 0.15);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 2.2, vertexColors: true, sizeAttenuation: false, depthWrite: false
  })));
}

// ---------- Sol ----------
const SUN_RADIUS = 8;
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_RADIUS, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffdd55 })
);
sun.userData.body = {
  name: 'Sol', color: '#ffdd55', subtitle: 'Estrela — classe G2V',
  rows: [
    ['Diâmetro', '1.392.700 km'],
    ['Massa', '333.000 × Terra'],
    ['Temperatura (superfície)', '5.500 °C'],
    ['Idade', '~4,6 bilhões de anos'],
  ],
  fact: 'O Sol concentra 99,86% de toda a massa do Sistema Solar.'
};
scene.add(sun);

// brilho do sol (sprite)
{
  const cv = document.createElement('canvas'); cv.width = cv.height = 256;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0, 'rgba(255,235,160,1)');
  g.addColorStop(0.25, 'rgba(255,200,80,.55)');
  g.addColorStop(1, 'rgba(255,160,40,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending
  }));
  glow.scale.setScalar(SUN_RADIUS * 6);
  scene.add(glow);
}

// ---------- Planetas ----------
// raio: proporcional (raio da Terra = 1 → 1.6 unidades, com piso p/ visibilidade)
// dist: distâncias comprimidas mas em ordem real; período orbital em anos terrestres
// (Terra completa 1 volta a cada ~60 s)
const EARTH_VIS = 1.6;
const PLANETS = [
  { name:'Mercúrio', rel:0.383, dist:18,  period:0.24,  day:'58,6 dias',  color:0x9c8e82, moons:'0',
    diameter:'4.879 km',  au:'0,39 UA',
    fact:'Apesar de ser o planeta mais próximo do Sol, não é o mais quente — Vênus é.' },
  { name:'Vênus',    rel:0.949, dist:26,  period:0.62,  day:'243 dias',   color:0xe8c46a, moons:'0',
    diameter:'12.104 km', au:'0,72 UA',
    fact:'Gira ao contrário: lá, o Sol nasce no oeste. Seu dia é mais longo que seu ano.' },
  { name:'Terra',    rel:1.0,   dist:34,  period:1.0,   day:'24 horas',   color:0x3b7ddd, moons:'1',
    diameter:'12.742 km', au:'1,00 UA',
    fact:'O único lugar conhecido no universo com vida — até onde sabemos.' },
  { name:'Marte',    rel:0.532, dist:44,  period:1.88,  day:'24,6 horas', color:0xc1553b, moons:'2',
    diameter:'6.779 km',  au:'1,52 UA',
    fact:'Abriga o Monte Olimpo, o maior vulcão do Sistema Solar: 21 km de altura.' },
  { name:'Júpiter',  rel:3.5,   dist:68,  period:11.86, day:'9,9 horas',  color:0xc9a066, moons:'95',
    diameter:'139.820 km', au:'5,20 UA',
    fact:'A Grande Mancha Vermelha é uma tempestade maior que a Terra, ativa há séculos.' },
  { name:'Saturno',  rel:3.0,   dist:92,  period:29.46, day:'10,7 horas', color:0xe0c48f, moons:'146',
    diameter:'116.460 km', au:'9,58 UA',
    fact:'É tão pouco denso que flutuaria em água — se existisse um oceano grande o bastante.' },
  { name:'Urano',    rel:1.9,   dist:114, period:84.0,  day:'17,2 horas', color:0x8fd3d8, moons:'28',
    diameter:'50.724 km',  au:'19,2 UA',
    fact:'Gira praticamente deitado: seu eixo é inclinado 98° em relação à órbita.' },
  { name:'Netuno',   rel:1.85,  dist:136, period:164.8, day:'16,1 horas', color:0x3f66d4, moons:'16',
    diameter:'49.244 km',  au:'30,1 UA',
    fact:'Tem os ventos mais rápidos do Sistema Solar: mais de 2.000 km/h.' },
];
// Nota: rel de Júpiter/Saturno/Urano/Netuno é comprimido (real: 11,2 / 9,4 / 4,0 / 3,9)
// para caber na cena, mas mantém a ordem de tamanho correta.

const EARTH_ORBIT_SECONDS = 60;
const clickables = [sun];
const planetPivots = [];

for (const p of PLANETS) {
  const pivot = new THREE.Object3D();
  pivot.rotation.y = Math.random() * Math.PI * 2; // posição inicial aleatória na órbita
  scene.add(pivot);

  const radius = Math.max(0.55, p.rel * EARTH_VIS);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 40, 40),
    new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.85, metalness: 0.05 })
  );
  mesh.position.x = p.dist;
  pivot.add(mesh);

  if (p.name === 'Saturno') {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(radius * 1.4, radius * 2.3, 64),
      new THREE.MeshBasicMaterial({ color: 0xcbb387, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
    );
    ring.rotation.x = Math.PI / 2 - 0.35;
    mesh.add(ring);
  }

  // linha da órbita
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * p.dist, 0, Math.sin(a) * p.dist));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 })
  ));

  mesh.userData.body = {
    name: p.name, color: '#' + p.color.toString(16).padStart(6, '0'),
    subtitle: 'Planeta — ' + p.au + ' do Sol',
    rows: [
      ['Diâmetro', p.diameter],
      ['Distância do Sol', p.au],
      ['Ano (órbita)', p.period < 1 ? Math.round(p.period * 365) + ' dias' : p.period.toLocaleString('pt-BR') + ' anos'],
      ['Dia (rotação)', p.day],
      ['Luas', p.moons],
    ],
    fact: p.fact
  };
  clickables.push(mesh);
  planetPivots.push({ pivot, mesh, speed: (Math.PI * 2) / (EARTH_ORBIT_SECONDS * p.period) });
}

// ---------- Controles de voo (mouse + WASD) ----------
const keys = {};
addEventListener('keydown', e => keys[e.code] = true);
addEventListener('keyup',   e => keys[e.code] = false);

let yaw = 0, pitch = -0.28;
let dragging = false, dragDist = 0, lastX = 0, lastY = 0;

renderer.domElement.addEventListener('pointerdown', e => {
  dragging = true; dragDist = 0; lastX = e.clientX; lastY = e.clientY;
});
addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  dragDist += Math.abs(dx) + Math.abs(dy);
  lastX = e.clientX; lastY = e.clientY;
  yaw   -= dx * 0.0032;
  pitch -= dy * 0.0032;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});
addEventListener('pointerup', e => {
  const wasClick = dragging && dragDist < 6;
  dragging = false;
  if (wasClick) pickAt(e.clientX, e.clientY);
});

// scroll = zoom (avança/recua na direção do olhar)
addEventListener('wheel', e => {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, -e.deltaY * 0.06);
}, { passive: true });

// ---------- Clique / painel de informações ----------
const raycaster = new THREE.Raycaster();
const infoEl = document.getElementById('info');

function pickAt(x, y) {
  raycaster.setFromCamera(new THREE.Vector2(
    (x / innerWidth) * 2 - 1, -(y / innerHeight) * 2 + 1
  ), camera);
  const hits = raycaster.intersectObjects(clickables, false);
  if (!hits.length) { infoEl.classList.remove('visible'); return; }
  const b = hits[0].object.userData.body;
  document.getElementById('info-name').textContent = b.name;
  document.getElementById('info-sub').textContent = b.subtitle;
  document.getElementById('info-dot').style.background = b.color;
  document.getElementById('info-table').innerHTML =
    b.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  document.getElementById('info-fact').textContent = b.fact;
  infoEl.classList.add('visible');
}
document.getElementById('info-close').addEventListener('click', () => infoEl.classList.remove('visible'));

// ---------- Loop ----------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // órbitas e rotações
  for (const p of planetPivots) {
    p.pivot.rotation.y += p.speed * dt;
    p.mesh.rotation.y += dt * 0.8;
  }
  sun.rotation.y += dt * 0.05;

  // câmera: orientação por yaw/pitch
  camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

  // movimento WASD relativo à câmera
  const speed = (keys['ShiftLeft'] || keys['ShiftRight'] ? 90 : 30) * dt;
  const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
  const right = new THREE.Vector3().crossVectors(fwd, camera.up).normalize();
  if (keys['KeyW']) camera.position.addScaledVector(fwd, speed);
  if (keys['KeyS']) camera.position.addScaledVector(fwd, -speed);
  if (keys['KeyA']) camera.position.addScaledVector(right, -speed);
  if (keys['KeyD']) camera.position.addScaledVector(right, speed);
  if (keys['KeyE'] || keys['Space']) camera.position.y += speed;
  if (keys['KeyQ']) camera.position.y -= speed;

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
