<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolinhas — Simulação de Física</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1017; }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 16px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
  }
  #spawnBtn {
    padding: 10px 18px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  #spawnBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99, 102, 241, 0.55); }
  #spawnBtn:active { transform: translateY(1px) scale(0.97); }
  #count {
    color: rgba(255, 255, 255, 0.65);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  #hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.35);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <button id="spawnBtn">+50 bolinhas</button>
  <span id="count"></span>
</div>
<div id="hint">segure o mouse pra atrair &nbsp;·&nbsp; clique rápido pra explodir</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const countEl = document.getElementById('count');

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Física ----------
  const GRAVITY = 1400;          // px/s²
  const RESTITUTION = 0.82;      // quique nas paredes
  const BALL_RESTITUTION = 0.92; // quique entre bolinhas
  const AIR_DRAG = 0.999;
  const ATTRACT_RADIUS = 260;
  const ATTRACT_FORCE = 3200;
  const EXPLODE_RADIUS = 300;
  const EXPLODE_FORCE = 1100;
  const MAX_SPEED = 2600;

  const COLORS = [
    '#ff5c7a', '#ff9f43', '#feca57', '#5cd85a',
    '#48dbfb', '#54a0ff', '#a29bfe', '#fd79a8',
    '#00d2d3', '#e17055'
  ];

  const balls = [];

  function spawnBall(x, y) {
    const r = 7 + Math.random() * 11;
    balls.push({
      x, y,
      vx: (Math.random() - 0.5) * 300,
      vy: (Math.random() - 0.5) * 150,
      r,
      mass: r * r,
      color: COLORS[(Math.random() * COLORS.length) | 0]
    });
  }

  function spawnBatch(n) {
    for (let i = 0; i < n; i++) {
      spawnBall(
        W * 0.15 + Math.random() * W * 0.7,
        -20 - Math.random() * 200
      );
    }
  }

  document.getElementById('spawnBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    spawnBatch(50);
  });

  // ---------- Mouse ----------
  const mouse = { x: 0, y: 0, down: false, downTime: 0 };

  canvas.addEventListener('mousedown', (e) => {
    mouse.down = true;
    mouse.downTime = performance.now();
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseup', (e) => {
    if (mouse.down && performance.now() - mouse.downTime < 200) {
      explode(e.clientX, e.clientY);
    }
    mouse.down = false;
  });

  // Suporte a toque
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    mouse.down = true;
    mouse.downTime = performance.now();
    mouse.x = t.clientX;
    mouse.y = t.clientY;
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
  }, { passive: false });
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (mouse.down && performance.now() - mouse.downTime < 200) {
      explode(mouse.x, mouse.y);
    }
    mouse.down = false;
  }, { passive: false });

  const shockwaves = [];
  function explode(cx, cy) {
    for (const b of balls) {
      const dx = b.x - cx;
      const dy = b.y - cy;
      const d = Math.hypot(dx, dy);
      if (d < EXPLODE_RADIUS && d > 0.001) {
        const falloff = 1 - d / EXPLODE_RADIUS;
        const impulse = EXPLODE_FORCE * falloff * falloff;
        b.vx += (dx / d) * impulse;
        b.vy += (dy / d) * impulse;
      }
    }
    shockwaves.push({ x: cx, y: cy, r: 10, alpha: 0.9 });
  }

  // ---------- Grade espacial (colisões O(n)) ----------
  const CELL = 40;
  let grid = new Map();

  function gridKey(cx, cy) { return cx * 100003 + cy; }

  function buildGrid() {
    grid.clear();
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const cx = (b.x / CELL) | 0;
      const cy = (b.y / CELL) | 0;
      const key = gridKey(cx, cy);
      let cell = grid.get(key);
      if (!cell) { cell = []; grid.set(key, cell); }
      cell.push(i);
    }
  }

  function resolveCollisions() {
    buildGrid();
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];
      const cx = (a.x / CELL) | 0;
      const cy = (a.y / CELL) | 0;
      for (let ox = -1; ox <= 1; ox++) {
        for (let oy = -1; oy <= 1; oy++) {
          const cell = grid.get(gridKey(cx + ox, cy + oy));
          if (!cell) continue;
          for (const j of cell) {
            if (j <= i) continue;
            collide(a, balls[j]);
          }
        }
      }
    }
  }

  function collide(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const minDist = a.r + b.r;
    const distSq = dx * dx + dy * dy;
    if (distSq >= minDist * minDist || distSq === 0) return;

    const dist = Math.sqrt(distSq);
    const nx = dx / dist;
    const ny = dy / dist;

    // Separação posicional (proporcional às massas)
    const overlap = minDist - dist;
    const total = a.mass + b.mass;
    a.x -= nx * overlap * (b.mass / total);
    a.y -= ny * overlap * (b.mass / total);
    b.x += nx * overlap * (a.mass / total);
    b.y += ny * overlap * (a.mass / total);

    // Impulso elástico ao longo da normal
    const rvx = b.vx - a.vx;
    const rvy = b.vy - a.vy;
    const velAlongNormal = rvx * nx + rvy * ny;
    if (velAlongNormal > 0) return; // já se afastando

    const impulse = -(1 + BALL_RESTITUTION) * velAlongNormal / (1 / a.mass + 1 / b.mass);
    a.vx -= (impulse / a.mass) * nx;
    a.vy -= (impulse / a.mass) * ny;
    b.vx += (impulse / b.mass) * nx;
    b.vy += (impulse / b.mass) * ny;
  }

  // ---------- Loop ----------
  let lastTime = performance.now();

  function step(dt) {
    const attracting = mouse.down && performance.now() - mouse.downTime >= 120;

    for (const b of balls) {
      b.vy += GRAVITY * dt;

      if (attracting) {
        const dx = mouse.x - b.x;
        const dy = mouse.y - b.y;
        const d = Math.hypot(dx, dy);
        if (d < ATTRACT_RADIUS && d > 1) {
          const falloff = 1 - d / ATTRACT_RADIUS;
          const f = ATTRACT_FORCE * (0.3 + 0.7 * falloff);
          b.vx += (dx / d) * f * dt;
          b.vy += (dy / d) * f * dt;
          // Amortecimento perto do cursor pra não orbitar infinito
          if (d < 60) { b.vx *= 0.92; b.vy *= 0.92; }
        }
      }

      b.vx *= AIR_DRAG;
      b.vy *= AIR_DRAG;

      const speed = Math.hypot(b.vx, b.vy);
      if (speed > MAX_SPEED) {
        b.vx = (b.vx / speed) * MAX_SPEED;
        b.vy = (b.vy / speed) * MAX_SPEED;
      }

      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Paredes
      if (b.x - b.r < 0)      { b.x = b.r;     b.vx = Math.abs(b.vx) * RESTITUTION; }
      else if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * RESTITUTION; }
      if (b.y + b.r > H) {
        b.y = H - b.r;
        b.vy = -Math.abs(b.vy) * RESTITUTION;
        b.vx *= 0.98; // atrito no chão
        if (Math.abs(b.vy) < 20) b.vy = 0; // repouso, evita jitter
      } else if (b.y - b.r < -400) {
        b.y = -400; // não deixa fugir muito pra cima
        b.vy = Math.abs(b.vy) * 0.5;
      }
    }

    // Duas iterações estabilizam pilhas de bolinhas sem custo perceptível
    resolveCollisions();
    resolveCollisions();
  }

  function draw() {
    ctx.fillStyle = '#0d1017';
    ctx.fillRect(0, 0, W, H);

    // Área de atração enquanto segura
    if (mouse.down && performance.now() - mouse.downTime >= 120) {
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, ATTRACT_RADIUS);
      g.addColorStop(0, 'rgba(139, 92, 246, 0.18)');
      g.addColorStop(1, 'rgba(139, 92, 246, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, ATTRACT_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ondas de choque das explosões
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.r += 14;
      s.alpha *= 0.88;
      if (s.alpha < 0.02) { shockwaves.splice(i, 1); continue; }
      ctx.strokeStyle = `rgba(255, 255, 255, ${s.alpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    for (const b of balls) {
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      // Brilho sutil
      ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    countEl.textContent = balls.length + ' bolinhas';
  }

  function loop(now) {
    // dt limitado: aba em background não gera saltos gigantes
    let dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;

    // Substeps fixos pra física estável independente do framerate
    const SUB = 2;
    for (let s = 0; s < SUB; s++) step(dt / SUB);

    draw();
    requestAnimationFrame(loop);
  }

  spawnBatch(50);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
